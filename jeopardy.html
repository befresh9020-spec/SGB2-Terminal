<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGB II JEOPARDY // TERMINAL</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #030508; /* Tieferes Schwarz für Sci-Fi Look */
  color: #c8dce8;
  font-family: 'SF Mono', 'Menlo', 'Consolas', 'Liberation Mono', monospace;
  overflow: hidden;
  user-select: none;
}

/* — CRT & FLICKER EFFECTS — */
#hexBg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
body::after {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
  pointer-events: none; z-index: 9999;
}
.crt-flicker {
  position: fixed; inset: 0; pointer-events: none; z-index: 9998;
  background: rgba(0,240,255,0.015);
  animation: flicker 4s infinite alternate;
}
@keyframes flicker {
  0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
  20%, 24%, 55% { opacity: 0.4; }
}

/* — HUD CORNERS (Metroid Style Angular) — */
.hud-corner {
  position: fixed; width: 40px; height: 40px;
  z-index: 100; pointer-events: none;
  animation: hudPulse 4s ease-in-out infinite;
}
.hud-tl { top: 10px; left: 10px; border-top: 3px solid rgba(0,240,255,0.4); border-left: 3px solid rgba(0,240,255,0.4); clip-path: polygon(0 0, 100% 0, 100% 3px, 3px 3px, 3px 100%, 0 100%); }
.hud-tr { top: 10px; right: 10px; border-top: 3px solid rgba(0,240,255,0.4); border-right: 3px solid rgba(0,240,255,0.4); animation-delay: 1s; clip-path: polygon(0 0, 100% 0, 100% 100%, calc(100% - 3px) 100%, calc(100% - 3px) 3px, 0 3px); }
.hud-bl { bottom: 10px; left: 10px; border-bottom: 3px solid rgba(0,240,255,0.4); border-left: 3px solid rgba(0,240,255,0.4); animation-delay: 2s; clip-path: polygon(0 0, 3px 0, 3px calc(100% - 3px), 100% calc(100% - 3px), 100% 100%, 0 100%); }
.hud-br { bottom: 10px; right: 10px; border-bottom: 3px solid rgba(0,240,255,0.4); border-right: 3px solid rgba(0,240,255,0.4); animation-delay: 3s; clip-path: polygon(calc(100% - 3px) 0, 100% 0, 100% 100%, 0 100%, 0 calc(100% - 3px), calc(100% - 3px) calc(100% - 3px)); }
@keyframes hudPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; box-shadow: 0 0 10px rgba(0,240,255,0.5); } }

#app {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  padding: 16px 24px; gap: 12px;
  position: relative; z-index: 1;
}

/* — BOOT (Wurde vorhin vermisst, jetzt wieder da!) — */
.boot-overlay {
  position: fixed; inset: 0; background: #030508;
  z-index: 5000; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
.boot-overlay.done { animation: bootWipe 0.6s ease-in 0.2s forwards; }
@keyframes bootWipe { 0% { clip-path: inset(0 0 0 0); } 100% { clip-path: inset(0 0 100% 0); } }
.boot-log { width: 500px; max-width: 85vw; text-align: left; font-size: 0.7rem; line-height: 1.8; color: rgba(0,240,255,0.6); letter-spacing: 1px; }
.boot-log .line { opacity: 0; }
.boot-log .line.vis { opacity: 1; transition: opacity 0.15s; }
.boot-log .line.ok { color: #00ff78; }
.boot-log .line.warn { color: #ffd000; }
.boot-log .line.title-line { color: #00f0ff; font-size: 1.4rem; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 25px rgba(0,240,255,0.4); margin-bottom: 10px; text-align: center; }
.boot-progress-wrap { width: 500px; max-width: 85vw; height: 3px; background: rgba(0,240,255,0.08); border-radius: 2px; overflow: hidden; }
.boot-progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #00f0ff, #00ff78); border-radius: 2px; transition: width 0.3s ease-out; box-shadow: 0 0 10px rgba(0,240,255,0.4); }

/* — ACTIVE TEAM BANNER — */
.active-team-banner {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 8px 24px; flex-shrink: 0;
  border-radius: 0; text-align: center;
  font-size: 0.8rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase;
  transition: all 0.4s ease;
  clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 50%, calc(100% - 15px) 100%, 15px 100%, 0 50%);
  animation: bannerGlow 2s ease-in-out infinite alternate;
}
@keyframes bannerGlow {
  0% { box-shadow: inset 0 0 10px rgba(var(--banner-rgb), 0.1); filter: drop-shadow(0 0 5px rgba(var(--banner-rgb), 0.3)); }
  100% { box-shadow: inset 0 0 20px rgba(var(--banner-rgb), 0.3); filter: drop-shadow(0 0 15px rgba(var(--banner-rgb), 0.6)); }
}
.active-team-banner .banner-icon { width: 20px; height: 20px; flex-shrink: 0; }

/* — SCOREBOARD — */
.scoreboard { display: flex; gap: 12px; flex-shrink: 0; }
.team-score { 
  flex: 1; display: flex; align-items: center; justify-content: space-between; 
  padding: 10px 18px; position: relative; overflow: hidden; transition: all 0.3s;
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
}
.team-score.is-active { 
  box-shadow: inset 0 0 25px rgba(var(--team-active-rgb), 0.3); 
  transform: translateY(-2px);
}
.team-1 { background: rgba(0,240,255,0.08); border-left: 3px solid #00f0ff; }
.team-2 { background: rgba(255,100,0,0.08); border-left: 3px solid #ff6400; }
.team-3 { background: rgba(180,0,255,0.08); border-left: 3px solid #b400ff; }
.team-4 { background: rgba(0,255,120,0.08); border-left: 3px solid #00ff78; }
.team-label { display: flex; align-items: center; gap: 10px; }
.team-icon { width: 24px; height: 24px; flex-shrink: 0; }
.team-name { font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
.team-1 .team-name, .team-1 .team-pts { color: #00f0ff; text-shadow: 0 0 8px rgba(0,240,255,0.4); }
.team-2 .team-name, .team-2 .team-pts { color: #ff6400; text-shadow: 0 0 8px rgba(255,100,0,0.4); }
.team-3 .team-name, .team-3 .team-pts { color: #b400ff; text-shadow: 0 0 8px rgba(180,0,255,0.4); }
.team-4 .team-name, .team-4 .team-pts { color: #00ff78; text-shadow: 0 0 8px rgba(0,255,120,0.4); }
.team-pts { font-size: 1.6rem; font-weight: 900; transition: transform 0.3s; }
.score-btns { display: flex; gap: 6px; margin-left: 10px; }
.score-btns button { 
  width: 26px; height: 26px; background: rgba(255,255,255,0.05); color: #fff; 
  border: none; clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
  font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold;
}
.score-btns button:hover { background: rgba(255,255,255,0.2); }
.score-delta { position: absolute; right: 60px; top: 0px; font-size: 1.2rem; font-weight: 900; pointer-events: none; animation: deltaFloat 1.2s ease-out forwards; z-index: 10; }
@keyframes deltaFloat { 0% { opacity: 1; transform: translateY(0) scale(1.5); } 100% { opacity: 0; transform: translateY(-30px) scale(1); } }

/* — BOARD (Sci-Fi Grid) — */
.board-container { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.category-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; flex-shrink: 0; }
.category-header { 
  padding: 12px 6px; text-align: center; font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; 
  color: #00f0ff; background: rgba(0,240,255,0.05); 
  border-bottom: 2px solid rgba(0,240,255,0.3); text-transform: uppercase; line-height: 1.2; 
  position: relative; overflow: hidden; transition: all 0.5s;
  clip-path: polygon(8px 0, 100% 0, 100% 100%, 0 100%, 0 8px);
}
.category-header.cleared { color: #00ff78; border-color: #00ff78; background: rgba(0,255,120,0.1); text-shadow: 0 0 10px rgba(0,255,120,0.5); }
.cat-sub { font-size: 0.5rem; opacity: 0.7; font-weight: 400; display: block; margin-top: 4px; letter-spacing: 1px; }
.cat-progress { position: absolute; bottom: 0; left: 0; height: 2px; background: #00f0ff; transition: width 0.5s ease-out; box-shadow: 0 0 8px #00f0ff; }

.questions-grid { flex: 1; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr); gap: 8px; min-height: 0; }
.q-cell { 
  display: flex; align-items: center; justify-content: center; 
  background: rgba(10, 16, 26, 0.8); border: 1px solid rgba(0,240,255,0.15); 
  cursor: pointer; transition: all 0.2s; perspective: 600px;
  clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
}
.q-cell:hover { 
  background: rgba(0, 240, 255, 0.15); border-color: #00f0ff; transform: scale(1.05); 
  box-shadow: 0 0 20px rgba(0,240,255,0.4); z-index: 10;
}
.q-cell .points { font-size: 1.8rem; font-weight: 900; color: #ff3c00; text-shadow: 0 0 12px rgba(255,60,0,0.6); letter-spacing: 2px; }
.q-cell.used { opacity: 0.1; pointer-events: none; border-color: transparent; filter: grayscale(100%); transform: scale(0.95); }

/* — MODAL (Metroid Dread Style) — */
.modal-overlay { position: fixed; inset: 0; background: rgba(2,4,8,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(12px); }
.modal-overlay.active { display: flex; }
.modal { 
  width: 90%; max-width: 1100px; background: #080b12; border: 1px solid rgba(0,240,255,0.3); 
  padding: 50px; box-shadow: 0 0 50px rgba(0,240,255,0.1), inset 0 0 30px rgba(0,240,255,0.05); 
  animation: modalIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative;
  clip-path: polygon(30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%, 0 30px);
}
@keyframes modalIn { from { transform: scale(0.9) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

.modal-split { display: flex; gap: 50px; align-items: flex-start; }
.modal-left { width: 180px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.modal-right { flex: 1; display: flex; flex-direction: column; }

.modal-avatar { 
  width: 150px; height: 150px; border-radius: 0; border: 2px solid rgba(0,240,255,0.6); 
  object-fit: cover; box-shadow: 0 0 30px rgba(0,240,255,0.3); animation: avatarPulse 3s infinite alternate; 
  clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
}
.modal-status { font-size: 0.7rem; color: #ff3c00; font-weight: bold; letter-spacing: 3px; animation: blink 1s infinite; }
.modal-category { font-size: 0.8rem; font-weight: 800; letter-spacing: 4px; color: rgba(0,240,255,0.6); text-transform: uppercase; margin-bottom: 8px; }
.modal-points { font-size: 1.2rem; font-weight: 900; color: #ff3c00; margin-bottom: 30px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,60,0,0.5); }
.modal-question { font-size: 1.6rem; font-weight: 500; line-height: 1.5; color: #fff; margin-bottom: 40px; min-height: 80px; }
.typewriter-cursor::after { content: ' _'; color: #00f0ff; animation: blink 1s infinite; }

.modal-answer { 
  padding: 25px 30px; background: rgba(0,255,120,0.08); border-left: 4px solid #00ff78; 
  font-size: 1.3rem; line-height: 1.5; color: #00ff78; display: none; position: relative; 
  clip-path: polygon(15px 0, 100% 0, 100% 100%, 0 100%, 0 15px);
}
.modal-answer.visible { display: block; animation: glitchReveal 0.4s ease-out; }

.modal-actions { display: flex; gap: 12px; margin-top: 40px; flex-wrap: wrap; }
.modal-btn { 
  padding: 12px 24px; font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; cursor: pointer; 
  text-transform: uppercase; font-family: inherit; transition: all 0.2s; border: none;
  clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
}
.btn-reveal { background: rgba(0,240,255,0.15); border-left: 3px solid #00f0ff; color: #00f0ff; width: 100%; text-align: center; font-size: 1rem; padding: 16px; }
.btn-reveal:hover { background: rgba(0,240,255,0.3); box-shadow: 0 0 25px rgba(0,240,255,0.3); }

/* Team Buttons in Modal */
.btn-t0 { background: rgba(0,240,255,0.1); color: #00f0ff; border-bottom: 2px solid #00f0ff; }
.btn-t0:hover { background: rgba(0,240,255,0.3); }
.btn-t1 { background: rgba(255,100,0,0.1); color: #ff6400; border-bottom: 2px solid #ff6400; }
.btn-t1:hover { background: rgba(255,100,0,0.3); }
.btn-t2 { background: rgba(180,0,255,0.1); color: #b400ff; border-bottom: 2px solid #b400ff; }
.btn-t2:hover { background: rgba(180,0,255,0.3); }
.btn-t3 { background: rgba(0,255,120,0.1); color: #00ff78; border-bottom: 2px solid #00ff78; }
.btn-t3:hover { background: rgba(0,255,120,0.3); }

.btn-nobody { background: rgba(255,60,60,0.1); color: #ff5555; border-bottom: 2px solid #ff5555; }
.btn-nobody:hover { background: rgba(255,60,60,0.3); }
.btn-close { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.6); margin-left: auto; }
.btn-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

/* — KAHOOT-STYLE LEADERBOARD OVERLAY — */
.leaderboard-overlay {
  position: fixed; inset: 0; background: rgba(2,4,8,0.95); display: none; 
  flex-direction: column; align-items: center; justify-content: center; z-index: 2500; backdrop-filter: blur(10px);
}
.leaderboard-overlay.active { display: flex; animation: fadeUp 0.4s ease-out forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.lb-title { font-size: 2.5rem; font-weight: 900; color: #00f0ff; letter-spacing: 6px; margin-bottom: 40px; text-shadow: 0 0 20px rgba(0,240,255,0.5); }
.lb-chart { display: flex; align-items: flex-end; justify-content: center; gap: 40px; height: 40vh; width: 80%; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
.lb-column { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; width: 120px; height: 100%; transition: transform 0.5s ease; }
.lb-bar { 
  width: 100%; background: var(--team-color); height: 0%; 
  transition: height 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
  position: relative; clip-path: polygon(15px 0, 100% 0, 100% 100%, 0 100%, 0 15px);
  display: flex; justify-content: center; align-items: flex-start; padding-top: 15px;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
}
.lb-score { font-size: 1.5rem; font-weight: 900; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }
.lb-team-name { margin-top: 15px; font-size: 1rem; font-weight: 800; letter-spacing: 2px; color: var(--team-color); text-transform: uppercase; text-align: center; }
.btn-lb-close { margin-top: 50px; padding: 15px 40px; font-size: 1rem; background: transparent; border: 2px solid #00f0ff; color: #00f0ff; cursor: pointer; font-weight: bold; letter-spacing: 2px; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px); transition: all 0.2s; }
.btn-lb-close:hover { background: rgba(0,240,255,0.15); box-shadow: 0 0 20px rgba(0,240,255,0.3); }


/* — FOOTER — */
.footer-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; flex-shrink: 0; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(0,240,255,0.1); }
.footer-bar span { font-size: 0.7rem; font-weight: bold; color: rgba(0,240,255,0.4); letter-spacing: 2px; }
.footer-btns { display: flex; gap: 12px; }
.btn-action { 
  padding: 8px 16px; background: transparent; font-family: inherit; font-size: 0.7rem; font-weight: 800; 
  letter-spacing: 2px; cursor: pointer; transition: all 0.2s; border: none;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
}
.btn-end-game { background: rgba(255,60,60,0.1); color: #ff5555; }
.btn-end-game:hover { background: rgba(255,60,60,0.25); }
.btn-leaderboard { background: rgba(255,208,0,0.1); color: #ffd000; }
.btn-leaderboard:hover { background: rgba(255,208,0,0.25); box-shadow: 0 0 15px rgba(255,208,0,0.3); }

/* Restliches (Setup, Winner, Timer) bleibt optisch angepasst erhalten, Code der Übersicht halber komprimiert */
.setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 24px; }
.setup-hero { display: flex; flex-direction: column; align-items: center; gap: 15px; }
.setup-title { font-size: 3rem; font-weight: 900; color: #00f0ff; text-shadow: 0 0 30px rgba(0,240,255,0.5); letter-spacing: 8px; }
.setup-sub { font-size: 1rem; color: #ff3c00; letter-spacing: 5px; margin-top: 4px; font-weight: bold;}
.setup-teams label { font-size: 0.8rem; color: #00f0ff; letter-spacing: 3px; font-weight: bold; }
.setup-teams select { padding: 10px 20px; background: rgba(0,240,255,0.1); border: 2px solid #00f0ff; color: #fff; font-family: inherit; font-size: 1rem; font-weight: bold; outline: none; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); }
.team-names-grid { display: grid; gap: 12px; width: 600px; max-width: 90vw; }
.team-name-input input { flex: 1; padding: 14px 18px; background: rgba(255,255,255,0.05); border: none; border-bottom: 2px solid rgba(255,255,255,0.2); color: #fff; font-family: inherit; font-size: 1rem; outline: none; font-weight: bold; transition: border-color 0.3s;}
.team-name-input input:focus { border-bottom-color: #00f0ff; background: rgba(0,240,255,0.05); }
.btn-start { padding: 18px 60px; background: rgba(0,240,255,0.15); border: 2px solid #00f0ff; color: #00f0ff; font-family: inherit; font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: all 0.2s; clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); }
.btn-start:hover { background: rgba(0,240,255,0.3); box-shadow: 0 0 40px rgba(0,240,255,0.4); transform: scale(1.05); }

.timer-container { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.05); margin-bottom: 25px; overflow: hidden; display: none; }
.timer-bar { height: 100%; width: 100%; background: #00f0ff; box-shadow: 0 0 15px #00f0ff; transition: width 1s linear; }
.timer-bar.warning { background: #ff3c00; box-shadow: 0 0 20px #ff3c00; }
</style>
</head>
<body>
<div class="crt-flicker"></div>
<canvas id="hexBg"></canvas>
<div class="hud-corner hud-tl"></div>
<div class="hud-corner hud-tr"></div>
<div class="hud-corner hud-bl"></div>
<div class="hud-corner hud-br"></div>

<div id="app"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-split">
      <div class="modal-left">
        <img id="modalAvatarImg" class="modal-avatar" src="" alt="Quizmaster">
        <div class="modal-status" id="modalStatus">FRAGE WIRD GELADEN...</div>
      </div>
      <div class="modal-right">
        <div class="modal-category" id="modalCat"></div>
        <div class="modal-points" id="modalPts"></div>
        <div class="modal-question typewriter-cursor" id="modalQ"></div>
        <div class="timer-container" id="timerCont"><div class="timer-bar" id="timerBar"></div></div>
        <div class="modal-answer" id="modalA"></div>
        <div class="modal-actions" id="modalActions"></div>
      </div>
    </div>
  </div>
</div>

<div class="leaderboard-overlay" id="leaderboardOverlay">
  <div class="lb-title">LIVE STANDINGS</div>
  <div class="lb-chart" id="lbChart">
    </div>
  <button class="btn-lb-close" data-action="close-leaderboard">ZURÜCK ZUM BOARD</button>
</div>

<div class="leaderboard-overlay" id="winnerOverlay" style="z-index: 3000;">
    <div class="lb-title" style="color:#ffd000; text-shadow: 0 0 30px rgba(255,208,0,0.5);">MISSION COMPLETE</div>
    <div id="winnerName" style="font-size: 4rem; font-weight: 900; margin-bottom: 10px;"></div>
    <div id="winnerScore" style="font-size: 2rem; color: #fff; margin-bottom: 40px; font-weight: bold;"></div>
    <button class="btn-lb-close" id="btnRestart" style="border-color:#ffd000; color:#ffd000;">NEUES SPIEL</button>
</div>

<script>
(function() {
  "use strict";

  // --- Dein bestehendes Setup & Variablen ---

  // --- AUDIO ENGINE ---
  var audioCtx = null;
  function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
  function playTone(freq, dur, type, vol) {
    try {
      var ctx = getAudio(); var osc = ctx.createOscillator(); var gain = ctx.createGain();
      osc.type = type || "sine"; osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(vol || 0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }
  function sndOpen() { playTone(300, 0.1, "square", 0.08); setTimeout(function(){ playTone(450, 0.15, "square", 0.1); }, 100); }

  // --- HEX BACKGROUND ---
  var canvas=document.getElementById("hexBg"), ctx=canvas.getContext("2d"), hexSize=35, hexH=hexSize*Math.sqrt(3), time=0;
  function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  window.addEventListener("resize",resizeCanvas); resizeCanvas();
  function drawHex(cx,cy,r){
    ctx.beginPath();
    for(var i=0;i<6;i++){
      var a=Math.PI/3*i-Math.PI/6;
      if(i===0)ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)); else ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    }
    ctx.closePath();
  }
  function renderHex(){
    time+=0.002; ctx.clearRect(0,0,canvas.width,canvas.height);
    var cols=Math.ceil(canvas.width/(hexSize*1.5))+2, rows=Math.ceil(canvas.height/hexH)+2;
    for(var c=-1;c<cols;c++) {
      for(var r=-1;r<rows;r++){
        var cx=c*hexSize*1.5, cy=r*hexH+(c%2?hexH/2:0);
        var d=Math.sqrt(Math.pow(cx-canvas.width/2,2)+Math.pow(cy-canvas.height/2,2));
        var w=Math.sin(d*0.003-time*2)*0.5+0.5;
        ctx.strokeStyle="rgba(0,240,255,"+(0.01+w*0.03)+")"; ctx.lineWidth=1; drawHex(cx,cy,hexSize-2); ctx.stroke();
      }
    }
    requestAnimationFrame(renderHex);
  }
  renderHex();

      {text:"> QUIZMASTER: ONLINE",cls:"warn"},
      {text:"> System bereit",cls:"ok"}
    ];
    var log=document.getElementById("bootLog"), bar=document.getElementById("bootBar");
    var els=[];
    for(var i=0;i<lines.length;i++){
      var el=document.createElement("div");
      el.className="line"+(lines[i].cls?" "+lines[i].cls:"");
      el.textContent=lines[i].text;
      log.appendChild(el);
      els.push(el);
    }
    var idx=0;
    var iv=setInterval(function(){
      if(idx<els.length){
        els[idx].classList.add("vis");
        bar.style.width=Math.round(((idx+1)/els.length)*100)+"%";
        idx++;
      } else {
        clearInterval(iv);
        setTimeout(function(){
          ov.classList.add("done");
          setTimeout(function(){ if(ov.parentNode)ov.parentNode.removeChild(ov); cb(); }, 800);
        }, 400);
      }
    }, 150);
  }

  // --- KAHOOT LEADERBOARD LOGIC ---
  function showLeaderboard() {
    var overlay = document.getElementById("leaderboardOverlay");
    var chart = document.getElementById("lbChart");
    chart.innerHTML = "";
    
    // Finde maximalen Score für die Balkenhöhe (mindestens 500, damit Balken nicht riesig bei 100 Punkten sind)
    var maxScore = 500;
    for(var i=0; i<state.teams.length; i++) { if(state.teams[i].score > maxScore) maxScore = state.teams[i].score; }

    // Sortiere Teams nach Punkten
    var sortedTeams = state.teams.map(function(t, idx) { return {t:t, idx:idx}; }).sort(function(a,b){ return b.t.score - a.t.score; });

    sortedTeams.forEach(function(item, position) {
      var hPct = maxScore > 0 ? Math.max((item.t.score / maxScore) * 100, 5) : 5; // Min 5% Höhe
      var col = document.createElement("div"); col.className = "lb-column";
      col.innerHTML = '<div class="lb-bar" style="--team-color:'+TEAM_COLORS[item.idx]+';"><span class="lb-score">'+item.t.score+'</span></div><div class="lb-team-name" style="--team-color:'+TEAM_COLORS[item.idx]+';">'+escHtml(item.t.name)+'</div>';
      chart.appendChild(col);
      
      // Animierte Höhe
      setTimeout(function(){
        col.querySelector('.lb-bar').style.height = hPct + '%';
      }, 100 + (position * 150));
    });

    overlay.classList.add("active");
  }

  function hideLeaderboard() {
    document.getElementById("leaderboardOverlay").classList.remove("active");
  }

  // --- MODAL / QUESTION LOGIC ---
  function openQuestion(col,row){
    var k=col+"-"+row; if(state.usedCells[k])return;
    var cat=CATEGORIES[col], q=cat.questions[row];
    state.currentQ={col:col, row:row, pts:q.pts}; state.answerRevealed=false;
    sndOpen();

    document.getElementById("modalCat").textContent=cat.name+" // "+cat.short;
    document.getElementById("modalPts").textContent=q.pts+" PUNKTE";
    document.getElementById("modalStatus").textContent = "SCANNING...";
    document.getElementById("modalAvatarImg").src = AVATAR;
    var a=document.getElementById("modalA"); a.textContent=q.a; a.classList.remove("visible");
    renderModalActions();

    var qEl = document.getElementById("modalQ");
    qEl.textContent = ""; qEl.classList.add("typewriter-cursor");
    document.getElementById("modalOverlay").classList.add("active");

    if(state.typeInterval) clearInterval(state.typeInterval);
    var i = 0, text = q.q;
    state.typeInterval = setInterval(function() {
      qEl.textContent += text.charAt(i); i++;
      if(i >= text.length) {
        clearInterval(state.typeInterval); state.typeInterval = null;
        qEl.classList.remove("typewriter-cursor");
        document.getElementById("modalStatus").textContent = "AWAITING INPUT";
      }
    }, 20);

    stopTimer();
    var tb = document.getElementById("timerBar"), tc = document.getElementById("timerCont");
    tc.style.display = "block"; tb.style.width = "100%"; tb.classList.remove("warning");
    var timeLeft = 30;
    state.gameTimer = setInterval(function() {
      timeLeft--; tb.style.width = ((timeLeft / 30) * 100) + "%";
      if(timeLeft <= 10) tb.classList.add("warning");
      if(timeLeft <= 0) { clearInterval(state.gameTimer); state.gameTimer = null; document.getElementById("modalStatus").textContent = "TIMEOUT!"; }
    }, 1000);
  }

    if(state.typeInterval) { clearInterval(state.typeInterval); state.typeInterval = null; }

    document.getElementById("modalQ").textContent = CATEGORIES[state.currentQ.col].questions[state.currentQ.row].q;

    document.getElementById("modalA").classList.add("visible");
    document.getElementById("modalStatus").textContent = "RESOLUTION";
    renderModalActions();
  }

  function awardPoints(ti){
    if(state.currentQ){
      state.teams[ti].score += state.currentQ.pts; sndCorrect();
      state.activeTeam = ti; // Gewinner sucht nächste Frage aus
      closeModal({team:ti, pts:state.currentQ.pts});
    } else closeModal();
  }

  function nobodyGetsIt(){ sndWrong(); state.activeTeam = (state.activeTeam + 1) % state.teams.length; closeModal(); }

  function closeModal(aw){
    if(state.typeInterval) { clearInterval(state.typeInterval); state.typeInterval = null; }
    stopTimer(); document.getElementById("modalOverlay").classList.remove("active");
    if(state.currentQ){ state.usedCells[state.currentQ.col+"-"+state.currentQ.row]=true; state.currentQ=null; }
    renderBoard();
    if(aw){ showScoreDelta(aw.team, aw.pts); }
    if(usedCount()>=state.totalCells) setTimeout(endGame, 800);
  }

  function manualScore(ti, d){ state.teams[ti].score+=d; renderBoard(); showScoreDelta(ti, d); }

  function endGame(){
    var m=-99999, wi=0;
    for(var i=0; i<state.teams.length; i++){ if(state.teams[i].score > m){ m=state.teams[i].score; wi=i; } }
    var w=state.teams[wi]; sndWinner();
    document.getElementById("winnerName").textContent=w.name;
    document.getElementById("winnerName").style.color=TEAM_COLORS[wi];
    document.getElementById("winnerScore").textContent=m+" PUNKTE";
    document.getElementById("winnerOverlay").classList.add("active");
  }

  function resetGame(){
    state={ phase:"setup", teamCount:2, teams:[], usedCells:{}, currentQ:null, answerRevealed:false, totalCells:30, typeInterval:null, gameTimer:null, activeTeam:0 };
    document.getElementById("winnerOverlay").classList.remove("active");
    document.getElementById("leaderboardOverlay").classList.remove("active");
    renderSetup();
  }

  // --- EVENTS ---
  document.addEventListener("click", function(e){
    var t=e.target; while(t && t!==document.body && !(t.dataset && t.dataset.action)) t=t.parentElement;
    if(!t || !t.dataset || !t.dataset.action) return;
    var a=t.dataset.action;
    if(a==="open-q") openQuestion(parseInt(t.dataset.col), parseInt(t.dataset.row));
    else if(a==="reveal") revealAnswer();
    else if(a==="award") awardPoints(parseInt(t.dataset.team));
    else if(a==="nobody") nobodyGetsIt();
    else if(a==="close-modal") closeModal();
    else if(a==="score-minus") manualScore(parseInt(t.dataset.team), -50);
    else if(a==="score-plus") manualScore(parseInt(t.dataset.team), 50);
    else if(a==="show-leaderboard") showLeaderboard();
    else if(a==="close-leaderboard") hideLeaderboard();
    else if(a==="end-game") if(confirm("Spiel wirklich beenden?")) endGame();
  });

  document.getElementById("btnRestart").addEventListener("click", resetGame);

  document.addEventListener("keydown", function(e){
    if(e.key==="Escape"){ 
        if(document.getElementById("modalOverlay").classList.contains("active")) closeModal(); 
        if(document.getElementById("leaderboardOverlay").classList.contains("active")) hideLeaderboard();
    }
    if(e.key===" " || e.key==="Enter"){
      if(document.getElementById("modalOverlay").classList.contains("active") && !state.answerRevealed){ e.preventDefault(); revealAnswer(); }
    }
  });

  renderSetup();
})();
</script>
</body>
</html>
