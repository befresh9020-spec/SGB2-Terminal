<!DOCTYPE html>
<html lang="de" data-theme="blue">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedarfsgemeinschaft Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════
       BG-TRAINING TERMINAL — HUD STYLESHEET
       Mit modernen CSS-Variablen für Theme-Wechsel
       ═══════════════════════════════════════════════ */

    :root[data-theme="blue"] {
      --primary: #00d4ff;
      --primary-dim: rgba(0, 212, 255, 0.08);
      --primary-glow: rgba(0, 212, 255, 0.55);
      --primary-mid: rgba(0, 212, 255, 0.3);
      --text-main: #c8e8f8;
      --text-dim: #5a7a8a;
      --border: rgba(0, 212, 255, 0.3);
      --hex: rgba(0, 212, 255, 0.05);
    }

    :root[data-theme="amber"] {
      --primary: #ff7b00;
      --primary-dim: rgba(255, 123, 0, 0.08);
      --primary-glow: rgba(255, 123, 0, 0.55);
      --primary-mid: rgba(255, 123, 0, 0.35);
      --text-main: #e8dfc0;
      --text-dim: #8a7a5a;
      --border: rgba(255, 123, 0, 0.35);
      --hex: rgba(255, 123, 0, 0.06);
    }

    :root[data-theme="green"] {
      --primary: #00ff88;
      --primary-dim: rgba(0, 255, 136, 0.08);
      --primary-glow: rgba(0, 255, 136, 0.55);
      --primary-mid: rgba(0, 255, 136, 0.3);
      --text-main: #c8f0d8;
      --text-dim: #5a8a6a;
      --border: rgba(0, 255, 136, 0.3);
      --hex: rgba(0, 255, 136, 0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #050a0a;
      color: var(--text-main);
      font-family: "Orbitron", sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: color 0.3s ease;
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.6); border-left: 1px solid var(--border); }
    ::-webkit-scrollbar-thumb { background: var(--primary-mid); border-radius: 0px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

    #bg-canvas, #noise-canvas {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
    }
    #bg-canvas { z-index: -2; }

    #noise-canvas {
      z-index: 1002;
      opacity: 1;
      mix-blend-mode: screen;
      image-rendering: pixelated; 
    }

    .visor-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 40%, transparent 30%, rgba(0,0,0,0.25) 65%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 997;
    }

    .visor-rim {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background:
        linear-gradient(to bottom, var(--primary-dim) 0%, transparent 8%),
        linear-gradient(to top,    var(--primary-dim) 0%, transparent 8%),
        linear-gradient(to right,  var(--hex) 0%, transparent 6%),
        linear-gradient(to left,   var(--hex) 0%, transparent 6%);
      pointer-events: none;
      z-index: 998;
      transition: background 0.5s;
    }

    .scanlines {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 200%;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
      );
      pointer-events: none;
      z-index: 1001;
      opacity: 0.65;
      animation: scanroll 8s linear infinite;
    }
    @keyframes scanroll {
      0%   { transform: translateY(0); }
      100% { transform: translateY(-50%); }
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      background: rgba(0,0,0,0.88);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 1000;
      transition: border-color 0.3s;
    }

    .visor-mode {
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: var(--primary);
      text-transform: uppercase;
      opacity: 0.7;
      font-family: "Roboto Mono", monospace;
      display: flex;
      align-items: center;
      gap: 15px;
      transition: color 0.3s;
    }

    .top-bar-ticks {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .top-bar-ticks span { display: block; height: 12px; width: 2px; background: var(--primary); opacity: 0.4; transition: background 0.3s; }
    .top-bar-ticks span:nth-child(3) { opacity: 0.9; height: 18px; }

    .theme-switch { display: flex; gap: 14px; align-items: center; }

    .theme-btn {
      background: transparent;
      border: 1px solid #5a7a8a;
      color: #5a7a8a;
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.3s;
      display: grid;
      place-items: center;
      position: relative;
    }
    .theme-btn[data-color="amber"] { color: #ff7b00; border-color: #553300; }
    .theme-btn[data-color="blue"] { color: #00d4ff; border-color: #004455; }
    .theme-btn[data-color="green"] { color: #00ff88; border-color: #005522; }

    .theme-btn:hover, .theme-btn:focus { outline: none; filter: brightness(1.5); }
    .theme-btn.active {
      border-color: currentColor;
      box-shadow: 0 0 10px currentColor;
    }
    .theme-btn.active::after {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid currentColor;
      opacity: 0.3;
      animation: pulse-ring 2s infinite;
    }
    @keyframes pulse-ring {
      0%   { transform: scale(1); opacity: 0.3; }
      50%  { transform: scale(1.15); opacity: 0.1; }
      100% { transform: scale(1); opacity: 0.3; }
    }

    .back-btn-wrapper {
      display: flex;
      justify-content: flex-start;
      max-width: 920px;
      margin: 24px auto 16px;
      padding: 0 18px;
      position: relative;
      z-index: 999;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: "Orbitron", sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      transition: all 0.25s;
      user-select: none;
    }
    .btn-back::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, var(--primary-dim) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.4s;
      pointer-events: none;
    }
    .btn-back:hover::before { transform: translateX(100%); }
    .btn-back:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-dim);
      box-shadow: 0 0 16px var(--primary-glow), inset 0 0 10px var(--primary-dim);
    }
    .btn-back-arrow { display: inline-block; transition: transform 0.25s; font-size: 0.75rem; }
    .btn-back:hover .btn-back-arrow { transform: translateX(-4px); text-shadow: 0 0 8px var(--primary); }

    .container {
      max-width: 920px;
      margin: 0 auto 60px;
      padding: 0 18px;
    }

    .terminal-window {
      background: rgba(8, 18, 14, 0.93);
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(0,0,0,0.7), inset 0 0 60px var(--primary-dim), 0 0 1px var(--primary-mid);
      position: relative;
      backdrop-filter: blur(12px);
      border-radius: 2px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .terminal-window::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, var(--hex) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .glitch-anim { animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
    @keyframes glitch-skew {
      0% { transform: skew(0deg); filter: drop-shadow(0 0 0 var(--primary)); }
      20% { transform: skew(-10deg); filter: drop-shadow(-5px 0 0 red) drop-shadow(5px 0 0 blue); }
      40% { transform: skew(10deg); }
      60% { transform: skew(-5deg); filter: drop-shadow(5px 0 0 var(--primary)); }
      80% { transform: skew(2deg); }
      100% { transform: skew(0deg); filter: drop-shadow(0 0 0 transparent); }
    }

    .hud-frame { position: relative; }
    .hud-frame::before, .hud-frame::after, .hud-corner-br, .hud-corner-bl {
      content: ""; position: absolute; width: 28px; height: 28px; pointer-events: none; z-index: 10;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .hud-frame::before { top: -2px; left: -2px; border-top: 3px solid var(--primary); border-left: 3px solid var(--primary); box-shadow: -2px -2px 8px var(--primary-glow); }
    .hud-frame::after { top: -2px; right: -2px; border-top: 3px solid var(--primary); border-right: 3px solid var(--primary); box-shadow: 2px -2px 8px var(--primary-glow); }
    .hud-corner-br { bottom: -2px; right: -2px; border-bottom: 3px solid var(--primary); border-right: 3px solid var(--primary); box-shadow: 2px 2px 8px var(--primary-glow); }
    .hud-corner-bl { bottom: -2px; left: -2px; border-bottom: 3px solid var(--primary); border-left: 3px solid var(--primary); box-shadow: -2px 2px 8px var(--primary-glow); }

    .terminal-header {
      padding: 18px 24px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
      display: flex; flex-direction: column; align-items: center; position: relative; gap: 4px;
      transition: border-color 0.3s;
    }
    .terminal-header::after {
      content: ""; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
      width: 60%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      box-shadow: 0 0 10px var(--primary);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .terminal-title {
      font-size: 1.25rem; color: var(--primary); text-transform: uppercase;
      letter-spacing: 6px; text-shadow: 0 0 14px var(--primary-glow), 0 0 40px var(--primary-mid); text-align: center;
      transition: color 0.3s, text-shadow 0.3s;
    }
    .terminal-subtitle {
      font-size: 0.68rem; color: var(--text-dim); font-family: "Roboto Mono", monospace;
      text-align: center; letter-spacing: 2px; text-transform: uppercase;
      transition: color 0.3s;
    }

    .terminal-content { padding: 24px; position: relative; }

    /* ─── PHASE INDICATOR ─── */
    .phase-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      font-family: "Roboto Mono", monospace;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: border-color 0.3s, color 0.3s;
    }
    .phase-step {
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.3s, text-shadow 0.3s;
    }
    .phase-step.active {
      color: var(--primary);
      text-shadow: 0 0 8px var(--primary-glow);
    }
    .phase-step.completed {
      color: #6dffb3;
      text-shadow: 0 0 6px rgba(109,255,179,0.4);
    }
    .phase-dot {
      width: 8px; height: 8px;
      border: 1px solid currentColor;
      transform: rotate(45deg);
      transition: background 0.3s;
    }
    .phase-step.active .phase-dot,
    .phase-step.completed .phase-dot {
      background: currentColor;
    }
    .phase-sep {
      width: 24px; height: 1px;
      background: var(--text-dim);
      opacity: 0.3;
      transition: background 0.3s;
    }

    /* ─── PROGRESS BAR ─── */
    .progress-container { margin-bottom: 28px; }
    .progress-text {
      display: flex; justify-content: space-between; font-size: 0.68rem;
      color: var(--text-dim); text-transform: uppercase; font-family: "Roboto Mono", monospace;
      letter-spacing: 1px; margin-bottom: 10px;
      transition: color 0.3s;
    }
    .progress-bar { height: 6px; width: 100%; display: flex; gap: 3px; }
    .progress-seg { flex: 1; background: rgba(255,255,255,0.05); position: relative; overflow: hidden; }
    .progress-seg.filled { background: var(--primary); box-shadow: 0 0 8px var(--primary); transition: background 0.3s, box-shadow 0.3s; }
    .progress-seg.filled::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 60%, rgba(255,255,255,0.25)); }

    /* ─── CASE BOX ─── */
    .case-box {
      background: rgba(0,0,0,0.4); border-left: 2px solid var(--primary);
      border-bottom: 1px solid rgba(255,255,255,0.05); padding: 18px;
      margin-bottom: 24px; font-family: "Roboto Mono", monospace; font-size: 0.95rem;
      color: var(--text-main); line-height: 1.65; position: relative;
      transition: border-color 0.3s, color 0.3s;
    }
    .case-box::before {
      content: ""; position: absolute; top: 0; right: 0;
      border-style: solid; border-width: 0 16px 16px 0;
      border-color: transparent var(--primary) transparent transparent; opacity: 0.4;
      transition: border-color 0.3s;
    }
    .typewriter-cursor {
      display: inline-block; width: 8px; height: 1em; background-color: var(--primary);
      animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 2px;
      transition: background-color 0.3s;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ─── OPTIONS / PERSONS ─── */
    .question-group {
      margin-bottom: 32px;
      animation: fadeUp 0.45s forwards;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .q-label {
      font-size: 0.65rem; color: #ffe066; text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 10px; display: block; font-weight: bold; font-family: "Roboto Mono", monospace;
      padding: 4px 0; border-bottom: 1px solid rgba(255,230,102,0.15);
    }

    .options-grid {
      display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }

    .option-btn {
      background: rgba(0,0,0,0.45); border: 1px solid var(--primary-mid);
      padding: 14px 16px; text-align: left; color: var(--text-main); cursor: pointer;
      font-family: "Roboto Mono", monospace; font-size: 0.95rem; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative; display: flex; justify-content: space-between; align-items: center;
      min-height: 56px; user-select: none; overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      box-shadow: 0 0 8px var(--primary-dim);
    }
    .option-btn::before {
      content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, var(--primary-mid), transparent);
      transform: translateX(-100%); transition: transform 0.4s; z-index: -1;
    }
    .option-btn:hover {
      background: var(--primary-dim); border-color: var(--primary); color: #ffffff;
      box-shadow: 0 0 20px var(--primary-glow), inset 0 0 10px var(--primary-dim); transform: translateY(-2px);
    }
    .option-btn.selected {
      background: var(--primary-mid); border-color: var(--primary); color: #ffffff;
      box-shadow: inset 4px 0 0 var(--primary), inset 0 0 20px var(--primary-glow), 0 0 30px var(--primary-glow), 0 0 10px var(--primary); 
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.4), 0 0 15px var(--primary);
      transform: translateY(-2px) scale(1.02); z-index: 10;
    }

    .checkbox-indicator {
      width: 16px; height: 16px; border: 1px solid var(--text-dim); flex-shrink: 0; margin-left: 12px;
      transition: 0.2s; position: relative; transform: rotate(45deg);
    }
    .option-btn.selected .checkbox-indicator {
      background: var(--primary); border-color: #ffffff; box-shadow: 0 0 15px #ffffff, 0 0 20px var(--primary);
    }
    .option-btn.selected .checkbox-indicator::after {
      content: ""; position: absolute; inset: -4px; border: 1px solid var(--primary); opacity: 0.3; animation: target-pulse 1.5s infinite;
    }
    @keyframes target-pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.3); opacity: 0; } }

    /* ─── eLb TAG ─── */
    .elb-tag {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 6px;
      margin-left: 8px;
      border-radius: 1px;
      vertical-align: middle;
      font-weight: 600;
    }
    .elb-tag.is-elb {
      background: rgba(109, 255, 179, 0.12);
      border: 1px solid rgba(109, 255, 179, 0.35);
      color: #6dffb3;
    }
    .elb-tag.no-elb {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.3);
      color: #ff4444;
    }

    /* ─── eLb ROWS ─── */
    .elb-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: rgba(0,0,0,0.45);
      border: 1px solid var(--primary-mid);
      margin-bottom: 10px;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      box-shadow: 0 0 8px var(--primary-dim);
      animation: fadeUp 0.4s forwards;
      animation-delay: calc(var(--i, 0) * 0.08s);
      opacity: 0;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .elb-person-name {
      font-family: "Roboto Mono", monospace;
      font-size: 0.95rem;
      color: var(--text-main);
      flex-shrink: 0;
      transition: color 0.3s;
    }
    .elb-choices {
      display: flex;
      gap: 8px;
    }
    .elb-toggle {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--text-dim);
      color: var(--text-dim);
      font-family: "Roboto Mono", monospace;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.25s;
      text-transform: uppercase;
      letter-spacing: 1px;
      user-select: none;
      position: relative;
      overflow: hidden;
      min-width: 90px;
      text-align: center;
    }
    .elb-toggle::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, var(--primary-mid), transparent);
      transform: translateX(-100%);
      transition: transform 0.35s, background 0.3s;
      z-index: -1;
    }
    .elb-toggle:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .elb-toggle:hover::before {
      transform: translateX(100%);
    }
    .elb-toggle.selected {
      background: var(--primary-mid);
      border-color: var(--primary);
      color: #ffffff;
      box-shadow: 0 0 12px var(--primary-glow), inset 0 0 8px var(--primary-dim);
      text-shadow: 0 0 6px rgba(255,255,255,0.3);
    }

    /* ─── CONTROLS ─── */
    .controls {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 28px;
      padding-top: 20px; border-top: 1px solid var(--border);
      transition: border-color 0.3s;
    }
    .controls.single { grid-template-columns: 1fr; }

    .btn-main {
      padding: 15px; background: transparent; border: 1px solid var(--primary); color: var(--primary);
      font-family: "Orbitron", sans-serif; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px;
      cursor: pointer; transition: all 0.25s; min-height: 52px; display: grid; place-items: center;
      position: relative; overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }
    .btn-main::before {
      content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, var(--primary) 0%, transparent 50%);
      opacity: 0; transition: opacity 0.3s, background 0.3s;
    }
    .btn-main:hover::before { opacity: 0.15; }
    .btn-main:hover, .btn-main:focus {
      background: var(--primary-dim); box-shadow: 0 0 20px var(--primary-glow), inset 0 0 15px var(--primary-dim);
      color: var(--text-main); outline: none;
    }
    .btn-main:disabled { border-color: #2a2a2a; color: #555; cursor: not-allowed; box-shadow: none; background: transparent; }
    .btn-main:disabled::before { display: none; }

    /* ─── FEEDBACK ─── */
    .feedback-area { margin-top: 28px; display: flex; flex-direction: column; gap: 12px; }
    .feedback-card {
      padding: 16px 18px; border: 1px solid; font-family: "Roboto Mono", monospace; font-size: 0.88rem;
      background: rgba(0,0,0,0.6); animation: slideIn 0.3s ease; position: relative; overflow: hidden;
    }
    .feedback-card::before { content: ""; position: absolute; top: 0; left: 0; bottom: 0; width: 3px; background: currentColor; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    .fb-correct { border-color: #6dffb3; color: #6dffb3; }
    .fb-wrong   { border-color: #ff4444; color: #ff4444; }
    .fb-title { display: block; margin-bottom: 8px; font-weight: bold; }

    a.norm {
      display: inline-block; background: var(--primary-dim); border: 1px solid var(--primary-mid); color: var(--primary);
      font-family: "Roboto Mono", monospace; font-size: 0.78rem; padding: 1px 6px; margin: 1px 2px; border-radius: 1px;
      text-shadow: 0 0 8px var(--primary-glow); letter-spacing: 0.5px; text-decoration: none; cursor: pointer; transition: all 0.2s ease;
    }
    a.norm:hover { background: var(--primary); color: #050a0a; box-shadow: 0 0 12px var(--primary-glow); text-shadow: none; }

    @media (max-width: 600px) {
      .container { margin-top: 10px; padding: 0 10px; }
      .terminal-content { padding: 16px; }
      .terminal-title { font-size: 1rem; letter-spacing: 3px; }
      .controls { grid-template-columns: 1fr; }
      .options-grid { grid-template-columns: 1fr; }
      .elb-row { flex-direction: column; gap: 10px; align-items: flex-start; }
      .elb-choices { width: 100%; }

    }

</head>

<body>
  <canvas id="bg-canvas"></canvas>
  <canvas id="noise-canvas"></canvas>

  <div class="visor-overlay"></div>
  <div class="visor-rim"></div>
  <div class="scanlines"></div>

  <div class="top-bar">
    <div class="visor-mode">
      <span>HUD V1.1</span>
      <div class="top-bar-ticks">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div class="theme-switch">
      <button class="theme-btn active" data-color="blue" onclick="setTheme('blue')">■</button>
      <button class="theme-btn" data-color="amber" onclick="setTheme('amber')">■</button>
      <button class="theme-btn" data-color="green" onclick="setTheme('green')">■</button>
    </div>
  </div>

  <div class="back-btn-wrapper">
    <a href="index.html" class="btn-back" onclick="triggerBackClick(event)">
      <span class="btn-back-arrow">◄</span> HAUPTMENÜ
    </a>
  </div>

  <main class="container">
    <div class="terminal-window hud-frame" id="app-window">
      <span class="hud-corner-bl"></span>
      <span class="hud-corner-br"></span>

      <div class="terminal-header">
        <h1 class="terminal-title" id="app-title">Bedarfsgemeinschaft</h1>
        <div class="terminal-subtitle" id="app-subtitle">eLb-Prüfung</div>
      </div>

      <div class="terminal-content">
        <div class="progress-container" id="progress-display"></div>

        <div class="phase-indicator" id="phase-indicator">
          <div class="phase-step active" id="phase-step-1">
            <div class="phase-dot"></div>
            <span>Phase 1: eLb-Prüfung</span>
          </div>
          <div class="phase-sep"></div>
          <div class="phase-step" id="phase-step-2">
            <div class="phase-dot"></div>
            <span>Phase 2: BG-Zuordnung</span>
          </div>
        </div>

        <div class="case-box">
          <span id="case-text"></span><span class="typewriter-cursor"></span>
        </div>

        <div class="question-group" id="question-group">
          <span class="q-label" id="q-label">Prüfe für jede Person: Handelt es sich um einen eLb nach § 7 Abs. 1 S. 1 SGB II?</span>
          <div id="elb-area"></div>
          <div class="options-grid" id="persons" style="display:none;"></div>
        </div>

        <button id="check-btn" class="btn-main" style="width: 100%; margin-bottom: 20px;">eLb-Prüfung auswerten</button>

        <div class="feedback-area" id="feedback"></div>

        <div class="controls single" id="nav-controls">
          <button id="restart-btn" class="btn-main" style="display:none;">System-Neustart</button>
          <button id="next-btn" class="btn-main" style="display:none;">Weiter zur BG-Zuordnung ►</button>
        </div>

      </div>
    </div>
  </main>

  <script>
    // ===== THEME (Moderne CSS Variablen Steuerung) =====
    const themeColors = {
      blue: "#00d4ff",
      amber: "#ff7b00",
      green: "#00ff88"
    };

    let currentTheme = "blue";

    function setTheme(theme) {
      currentTheme = theme;
      // Setzt das data-theme Attribut auf dem html-Tag
      document.documentElement.setAttribute('data-theme', theme);

      // Buttons aktualisieren
      document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.querySelector(`.theme-btn[data-color="${theme}"]`);
      if (activeBtn) activeBtn.classList.add('active');
    }

    function triggerBackClick(e) {
      e.preventDefault();
      setTimeout(() => { window.location.href = 'index.html'; }, 300);
    }

    // ===== FALLDATEN =====
    const cases = [
      {
        text: "Jasmin (32) lebt mit ihrem Partner Alex (35) seit 2 Jahren in einer Wohnung in Ulm. Jasmins Sohn Tom (6) wohnt auch dort. Jasmin und Alex sind nicht verheiratet. Beide können arbeiten. Alex ist nicht der Vater von Tom.",

            elbReason: "Tom ist 6 Jahre alt. Er hat das 15. Lebensjahr noch nicht vollendet und erfüllt daher nicht die Altersvoraussetzung des § 7 Abs. 1 S. 1 SGB II.",

      {
        text: "Max (26) lebt bei seinen erwerbsfähigen Eltern in Ulm. Er ist unverheiratet und hat kein eigenes Einkommen. Max kann in Vollzeit arbeiten.",
        persons: [
          {
            name: "Max",
            isElb: true,
            elbReason: "Max ist 26 Jahre alt und kann in Vollzeit arbeiten. Die Voraussetzungen des § 7 Abs. 1 S. 1 SGB II sind erfüllt.",
            bg: true,
            reason: "Erwerbsfähiger Leistungsberechtigter <br>§ 7 Abs. 3 Nr. 1 SGB II"
          },
          {
            name: "Mutter",
            isElb: true,
            elbReason: "Es liegen keine Anhaltspunkte gegen eine Erwerbsfähigkeit vor. Die Voraussetzungen des § 7 Abs. 1 S. 1 SGB II sind grundsätzlich erfüllt.",
            bg: false,
            reason: "Elternteil eines Ü25-Leistungsberechtigten <br>§ 7 Abs. 3 Nr. 4 SGB II - Umkehrschluss"
          },
          {
            name: "Vater",
            isElb: true,
            elbReason: "Es liegen keine Anhaltspunkte gegen eine Erwerbsfähigkeit vor. Die Voraussetzungen des § 7 Abs. 1 S. 1 SGB II sind grundsätzlich erfüllt.",
            bg: false,
            reason: "Elternteil eines Ü25-Leistungsberechtigten <br>§ 7 Abs. 3 Nr. 4 SGB II - Umkehrschluss"
          }
        ]
      },
      {
        text: "Rick (41) wohnt mit seiner Ehefrau Sara (38) und dem gemeinsamen Kind Nora (12) in einer Wohnung in Neu-Ulm. Rick arbeitet in Teilzeit als Lagerhelfer. Sara erhält eine volle Erwerbsminderungsrente, da sie nicht erwerbsfähig ist.",
        persons: [
          {

            isElb: true,
            elbReason: "Rick arbeitet in Teilzeit und ist somit erwerbsfähig. Die Voraussetzungen des § 7 Abs. 1 S. 1 SGB II sind erfüllt.",
            bg: true,
            reason: "Erwerbsfähiger Leistungsberechtigter <br>§ 7 Abs. 3 Nr. 1 SGB II"
          },
          {
            name: "Sara",
            isElb: false,
            elbReason: "Sara bezieht eine volle Erwerbsminderungsrente und ist ausdrücklich nicht erwerbsfähig. Die Voraussetzung der Erwerbsfähigkeit gem. § 7 Abs. 1 S. 1 SGB II i.V.m. § 8 SGB II ist nicht erfüllt.",
            bg: true,
            reason: "Partnerin des eLb <br>§ 7 Abs. 3 Nr. 3a SGB II"
          },
          {
            name: "Nora",
            isElb: false,
            elbReason: "Nora ist 12 Jahre alt. Sie hat das 15. Lebensjahr noch nicht vollendet und erfüllt daher nicht die Altersvoraussetzung des § 7 Abs. 1 S. 1 SGB II.",
            bg: true,
            reason: "Gemeinsames Kind des eLb und der Partnerin unter 25, das seinen Lebensunterhalt nicht selbst bestreiten kann <br> § 7 Abs. 3 Nr. 4 SGB II"
          }
        ]
      },
      {
        text: "Mona (45) wohnt mit ihren Kindern Mia (16) und James (11) in einer Wohnung in Biberach. Mona ist nicht erwerbsfähig und bezieht eine Erwerbsminderungsrente. Die Kinder besuchen eine allgemeinbildende Schule.",
        persons: [
          {
            name: "Mona",
            isElb: false,
            elbReason: "Mona ist nicht erwerbsfähig und bezieht eine Erwerbsminderungsrente. Die Voraussetzung der Erwerbsfähigkeit gem. § 7 Abs. 1 S. 1 SGB II i.V.m. § 8 SGB II ist nicht erfüllt.",
            bg: true,
            reason: "Kein erwerbsfähiger Leistungsberechtigter im Haushalt mit einem erwerbsfähigen Kind <br>§ 7 Abs. 3 Nr. 2 SGB II"
          },
          {
            name: "Mia",
            isElb: true,
            elbReason: "Mia ist 16 Jahre alt und hat das 15. Lebensjahr vollendet. Es liegen keine Anhaltspunkte gegen eine Erwerbsfähigkeit vor. Die Voraussetzungen des § 7 Abs. 1 S. 1 SGB II sind erfüllt.",
            bg: true,
            reason: "Erwerbsfähige Leistungsberechtigte <br>§ 7 Abs. 3 Nr. 1 SGB II"
          },
          {
            name: "James",
            isElb: false,
            elbReason: "James ist 11 Jahre alt. Er hat das 15. Lebensjahr noch nicht vollendet und erfüllt daher nicht die Altersvoraussetzung des § 7 Abs. 1 S. 1 SGB II.",
            bg: true,
            reason: "Kind von Mona <br> § 7 Abs. 3 Nr. 4 SGB II"
          }
        ]
      },
      {
        text: "Pierre (40) wohnt mit seinen Kindern Yves (10) und Jacques (14) in einer Wohnung in Konstanz. Pierre ist nicht erwerbsfähig und bezieht eine Erwerbsminderungsrente. Die Kinder besuchen eine allgemeinbildende Schule.",
        persons: [
          {
            name: "Pierre",
            isElb: false,
            elbReason: "Pierre ist nicht erwerbsfähig und bezieht eine Erwerbsminderungsrente. Die Voraussetzung der Erwerbsfähigkeit gem. § 7 Abs. 1 S. 1 SGB II i.V.m. § 8 SGB II ist nicht erfüllt.",
            bg: false,
            reason: "Kein erwerbsfähiger Leistungsberechtigter <br>§ 7 Abs. 3 Nr. 1 SGB II"
          },
          {
            name: "Yves",
            isElb: false,
            elbReason: "Yves ist 10 Jahre alt. Er hat das 15. Lebensjahr noch nicht vollendet und erfüllt daher nicht die Altersvoraussetzung des § 7 Abs. 1 S. 1 SGB II.",
            bg: false,
            reason: "Kein erwerbsfähiger Leistungsberechtigter & kein Kind eines eLb <br>§ 7 Abs. 3 Nr. 1 SGB II & § 7 Abs. 3 Nr. 4 SGB II"
          },
          {
            name: "Jacques",
            isElb: false,
            elbReason: "Jacques ist 14 Jahre alt. Er hat das 15. Lebensjahr noch nicht vollendet und erfüllt daher nicht die Altersvoraussetzung des § 7 Abs. 1 S. 1 SGB II.",
            bg: false,
            reason: "Kein erwerbsfähiger Leistungsberechtigter & kein Kind eines eLb <br>§ 7 Abs. 3 Nr. 1 SGB II & § 7 Abs. 3 Nr. 4 SGB II"
          }
        ]
      }
    ];

    // ===== STATE =====
    let currentIndex = 0;
    let currentCase = cases[currentIndex];
    let phase = 1;
    let elbDecisions = {};
    let selectedPersons = [];

    // ===== DOM REFS =====
    const appWindow = document.getElementById("app-window");
    const caseTextEl = document.getElementById("case-text");
    const elbArea = document.getElementById("elb-area");
    const personsEl = document.getElementById("persons");
    const feedbackEl = document.getElementById("feedback");
    const checkBtn = document.getElementById("check-btn");
    const restartBtn = document.getElementById("restart-btn");
    const nextBtn = document.getElementById("next-btn");
    const progressDisplay = document.getElementById("progress-display");
    const qLabel = document.getElementById("q-label");
    const subtitleEl = document.getElementById("app-subtitle");
    const phaseStep1 = document.getElementById("phase-step-1");
    const phaseStep2 = document.getElementById("phase-step-2");
    const phaseIndicator = document.getElementById("phase-indicator");

    // ===== HELPERS =====
    function highlightNorms(text) {
      const normRegex = /§\s*(\d+)[a-zA-Z]*\s*(Abs\.?\s*\d+[a-zA-Z]*)?\s*(Nr\.?\s*\d+[a-zA-Z]*)?\s*(Satz\s*\d+)?\s*SGB\s*([IVX]+)/g;
      return text.replace(normRegex, (match, paragraph, abs, nr, satz, sgbNum) => {
        const baseUrl = `https://dejure.org/gesetze/SGB_${sgbNum}/${paragraph}.html`;
        return `<a href="${baseUrl}" target="_blank" class="norm" title="Gesetzestext aufrufen">${match}</a>`;
      });
    }

    function renderProgress() {
      progressDisplay.innerHTML = '';
      const pText = document.createElement('div');
      pText.className = 'progress-text';
      pText.innerHTML = `<span>DATENSATZ</span><span>${currentIndex + 1} // ${cases.length}</span>`;
      const pBar = document.createElement('div');
      pBar.className = 'progress-bar';
      for (let i = 0; i < cases.length; i++) {
        const seg = document.createElement('div');
        seg.className = 'progress-seg' + (i <= currentIndex ? ' filled' : '');
        pBar.appendChild(seg);
      }
      progressDisplay.appendChild(pText);
      progressDisplay.appendChild(pBar);
    }

    function updatePhaseIndicator() {
      phaseStep1.className = 'phase-step' + (phase === 1 ? ' active' : ' completed');
      phaseStep2.className = 'phase-step' + (phase === 2 ? ' active' : '');
    }

    function allElbDecided() {
      return currentCase.persons.every((_, i) => elbDecisions[i] !== undefined);
    }

    function updateCheckBtnState() {
      if (phase === 1) {
        checkBtn.textContent = "eLb-Prüfung auswerten";
        checkBtn.disabled = !allElbDecided();
      } else {
        checkBtn.textContent = selectedPersons.length === 0 ? "Keine BG – Antwort prüfen" : "Antwort prüfen";
      }
    }

    // ===== PHASE 1: eLb =====
    function renderElbPhase() {
      phase = 1;
      elbDecisions = {};
      updatePhaseIndicator();
      subtitleEl.textContent = "eLb-Prüfung";

      elbArea.style.display = "block";
      personsEl.style.display = "none";
      qLabel.textContent = "Prüfe für jede Person: Handelt es sich um einen eLb nach § 7 Abs. 1 S. 1 SGB II?";
      qLabel.style.display = "block";

      elbArea.innerHTML = "";
      feedbackEl.innerHTML = "";

      currentCase.persons.forEach((person, index) => {
        const row = document.createElement("div");
        row.className = "elb-row";
        row.style.setProperty("--i", index);

        const nameSpan = document.createElement("span");
        nameSpan.className = "elb-person-name";
        nameSpan.textContent = person.name;

        const choices = document.createElement("div");
        choices.className = "elb-choices";

        const btnYes = document.createElement("button");
        btnYes.className = "elb-toggle";
        btnYes.textContent = "eLb";

        const btnNo = document.createElement("button");
        btnNo.className = "elb-toggle";
        btnNo.textContent = "Kein eLb";

        btnYes.addEventListener("click", () => {
          if (feedbackEl.innerHTML !== "") return;
          elbDecisions[index] = true;
          btnYes.classList.add("selected");
          btnNo.classList.remove("selected");
          updateCheckBtnState();
        });

        btnNo.addEventListener("click", () => {
          if (feedbackEl.innerHTML !== "") return;
          elbDecisions[index] = false;
          btnNo.classList.add("selected");
          btnYes.classList.remove("selected");
          updateCheckBtnState();
        });

        choices.appendChild(btnYes);
        choices.appendChild(btnNo);
        row.appendChild(nameSpan);
        row.appendChild(choices);
        elbArea.appendChild(row);
      });

      checkBtn.style.display = "block";
      checkBtn.disabled = true;
      nextBtn.style.display = "none";
      restartBtn.style.display = "none";
      document.getElementById("nav-controls").classList.remove("single");

      updateCheckBtnState();
    }

    function checkElb() {
      checkBtn.disabled = true;
      feedbackEl.innerHTML = "";

      currentCase.persons.forEach((person, index) => {
        const userSaidElb = elbDecisions[index];
        const correct = userSaidElb === person.isElb;

        const card = document.createElement("div");
        card.className = "feedback-card";

        if (correct) {
          card.classList.add("fb-correct");
          card.innerHTML = `
            <span class="fb-title">${person.name}: KORREKT${userSaidElb ? " – ist eLb" : " – kein eLb"}</span>
            ${highlightNorms(person.elbReason)}
          `;
        } else {
          card.classList.add("fb-wrong");
          card.innerHTML = `
            <span class="fb-title">${person.name}: FEHLERHAFT${person.isElb ? " – ist eLb" : " – kein eLb"}</span>
            ${highlightNorms(person.elbReason)}
          `;
        }

        feedbackEl.appendChild(card);
      });

      nextBtn.style.display = "block";
      nextBtn.textContent = "Weiter zur BG-Zuordnung ►";
      document.getElementById("nav-controls").classList.add("single");

      setTimeout(() => {
        feedbackEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 150);
    }

    // ===== PHASE 2: BG =====
    function renderBgPhase() {
      phase = 2;
      selectedPersons = [];
      updatePhaseIndicator();
      subtitleEl.textContent = "BG-Zuordnung";

      appWindow.classList.remove("glitch-anim");
      void appWindow.offsetWidth;
      appWindow.classList.add("glitch-anim");

      elbArea.style.display = "none";
      personsEl.style.display = "grid";
      qLabel.textContent = "Wähle Personen für die BG aus:";

      personsEl.innerHTML = "";
      feedbackEl.innerHTML = "";

      currentCase.persons.forEach((person, index) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";

        const elbTagClass = person.isElb ? "elb-tag is-elb" : "elb-tag no-elb";
        const elbTagText = person.isElb ? "eLb" : "Kein eLb";

        btn.innerHTML = `
          <span>${person.name}<span class="${elbTagClass}">${elbTagText}</span></span>
          <div class="checkbox-indicator"></div>
        `;

        btn.addEventListener("click", () => {
          if (checkBtn.disabled) return;
          btn.classList.toggle("selected");
          if (selectedPersons.includes(index)) {
            selectedPersons = selectedPersons.filter(i => i !== index);
          } else {
            selectedPersons.push(index);
          }
          updateCheckBtnState();
        });

        personsEl.appendChild(btn);
      });

      checkBtn.style.display = "block";
      checkBtn.disabled = false;
      
      // LOGIK-FIX: Button ausblenden, solange der User nicht auf Prüfen geklickt hat.
      nextBtn.style.display = "none"; 
      nextBtn.textContent = "Nächster Datensatz";
      restartBtn.style.display = "none";
      document.getElementById("nav-controls").classList.remove("single");

      updateCheckBtnState();
    }

    function checkBg() {
      checkBtn.disabled = true;
      feedbackEl.innerHTML = "";

      currentCase.persons.forEach((person, index) => {
        const userSelected = selectedPersons.includes(index);

        const card = document.createElement("div");
        card.className = "feedback-card";

        if (userSelected === person.bg) {
          card.classList.add("fb-correct");
          card.innerHTML = `
            <span class="fb-title">${person.name}: KORREKT</span>
            ${highlightNorms(person.reason)}
          `;
        } else {
          card.classList.add("fb-wrong");
          card.innerHTML = `
            <span class="fb-title">${person.name}: FEHLERHAFT</span>
            ${highlightNorms(person.reason)}
          `;
        }

        feedbackEl.appendChild(card);
      });

      // LOGIK-FIX: Den Button erst hier anzeigen.
      nextBtn.style.display = "block";
      document.getElementById("nav-controls").classList.add("single");
      
      nextBtn.focus();
      setTimeout(() => {
        feedbackEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 150);
    }

    // ===== UNIFIED CHECK =====
    checkBtn.addEventListener("click", () => {
      if (checkBtn.disabled) return;
      if (phase === 1) checkElb();
      else checkBg();
    });

    // ===== NEXT =====
    nextBtn.addEventListener("click", () => {
      if (phase === 1) renderBgPhase();
      else nextCase();
    });

    // ===== CASE NAV =====
    function loadCase() {
      appWindow.classList.remove("glitch-anim");
      void appWindow.offsetWidth;
      appWindow.classList.add("glitch-anim");

      renderProgress();
      caseTextEl.textContent = currentCase.text;
      renderElbPhase();
    }

    function nextCase() {
      if (currentIndex < cases.length - 1) {
        currentIndex++;
        currentCase = cases[currentIndex];
        loadCase();
      } else {
        showEndScreen();
      }
    }

    function showEndScreen() {
      caseTextEl.innerHTML = "<span style='color: var(--primary); text-transform: uppercase; letter-spacing: 2px;'>Training beendet.</span>";
      elbArea.style.display = "none";
      personsEl.style.display = "none";
      personsEl.innerHTML = "";
      qLabel.style.display = 'none';
      phaseIndicator.style.display = 'none';
      feedbackEl.innerHTML = "<div class='feedback-card fb-correct' style='text-align:center;'>Alle Datensätze wurden bearbeitet.</div>";

      checkBtn.style.display = "none";
      nextBtn.style.display = "none";
      restartBtn.style.display = "block";
      document.getElementById("nav-controls").classList.add("single");
      progressDisplay.innerHTML = `<div class="progress-text"><span>STATUS</span><span style="color:#6dffb3">COMPLETED</span></div>`;
    }

    restartBtn.addEventListener("click", () => {
      currentIndex = 0;
      currentCase = cases[currentIndex];
      restartBtn.style.display = "none";
      qLabel.style.display = 'block';
      phaseIndicator.style.display = 'flex';
      loadCase();
    });

    // Initial load
    loadCase();

    // ===== CANVAS =====
    const bgCanvas = document.getElementById("bg-canvas");
    const noiseCanvas = document.getElementById("noise-canvas");
    const bgCtx = bgCanvas.getContext("2d");
    const noiseCtx = noiseCanvas.getContext("2d", { alpha: false });

    let w, h;
    let particles = [];

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      bgCanvas.width = w; bgCanvas.height = h;
      noiseCanvas.width = w; noiseCanvas.height = h;
      generateNoise();
      initParticles();
    }

    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resize, 200);
    });

    function generateNoise() {
      const imgData = noiseCtx.createImageData(w, h);
      const buffer32 = new Uint32Array(imgData.data.buffer);
      const len = buffer32.length;
      for (let i = 0; i < len; i++) {
        if (Math.random() < 0.05) {
          buffer32[i] = 0xff000000 | (Math.random() * 255 << 16) | (Math.random() * 255 << 8) | (Math.random() * 255);
        } else {
          buffer32[i] = 0xff000000;
        }
      }
      noiseCtx.putImageData(imgData, 0, 0);
      noiseCanvas.style.opacity = "0.03"; 
    }

    function initParticles() {
      particles = [];
      const numParticles = Math.floor((w * h) / 15000); 
      for (let i = 0; i < numParticles; i++) {
        particles.push({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          radius: Math.random() * 1.5 + 0.5
        });
      }
    }

    function animateNetwork() {
      bgCtx.clearRect(0, 0, w, h);
      
      // Nutzt das simplifizierte Theme-Objekt
      const rawColor = themeColors[currentTheme];
      bgCtx.fillStyle = rawColor;
      bgCtx.strokeStyle = rawColor;

      particles.forEach((p, index) => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
        bgCtx.beginPath();
        bgCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        bgCtx.fill();
        for (let j = index + 1; j < particles.length; j++) {
          const p2 = particles[j];
          const dx = p.x - p2.x;
          const dy = p.y - p2.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            bgCtx.globalAlpha = 1 - (dist / 100);
            bgCtx.lineWidth = 0.5;
            bgCtx.beginPath();
            bgCtx.moveTo(p.x, p.y);
            bgCtx.lineTo(p2.x, p2.y);
            bgCtx.stroke();
          }
        }
      });
      bgCtx.globalAlpha = 1.0;
      requestAnimationFrame(animateNetwork);
    }

    resize();
    animateNetwork();

  </script>
</body>
