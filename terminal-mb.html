<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Roboto+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <title>SGB II Mehrbedarf Rechner</title>

<style id="theme-css">
  /* ═══════════════════════════════════════════════
     MEHRBEDARF TERMINAL — STYLESHEET
     by Bjørn F.  |  dark HUD / visor aesthetic
     ═══════════════════════════════════════════════ */

  /* ─── THEME VARIABLES ─── */
  :root {
    --theme-main-rgb: 255, 123, 0;  /* Orange */
    --theme-text: #e8dfc0;
    --theme-text-muted: #8a7a5a;
  }
  
  body[data-theme="blue"] {
    --theme-main-rgb: 0, 212, 255;
    --theme-text: #c8e8f8;
    --theme-text-muted: #5a7a8a;
  }
  
  body[data-theme="green"] {
    --theme-main-rgb: 0, 255, 136;
    --theme-text: #c8f0d8;
    --theme-text-muted: #5a8a6a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #050a0a;
    color: var(--theme-text);
    font-family: "Orbitron", sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    transition: color 0.4s, background-color 0.4s;
  }

  /* ─── CUSTOM SCROLLBARS ─── */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.6); border-left: 1px solid rgba(var(--theme-main-rgb), 0.35); }
  ::-webkit-scrollbar-thumb { background: rgba(var(--theme-main-rgb), 0.35); border-radius: 0px; }
  ::-webkit-scrollbar-thumb:hover { background: rgb(var(--theme-main-rgb)); box-shadow: 0 0 10px rgba(var(--theme-main-rgb), 0.55); }

  /* ─── HINTERGRUND ─── */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2;
  }

  .visor-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at 50% 40%,
      transparent 30%,
      rgba(0,0,0,0.25) 65%,
      rgba(0,0,0,0.75) 100%
    );
    pointer-events: none;
    z-index: 997;
  }

  .visor-rim {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background:
      linear-gradient(to bottom, rgba(var(--theme-main-rgb), 0.07) 0%, transparent 8%),
      linear-gradient(to top,    rgba(var(--theme-main-rgb), 0.07) 0%, transparent 8%),
      linear-gradient(to right,  rgba(var(--theme-main-rgb), 0.04) 0%, transparent 6%),
      linear-gradient(to left,   rgba(var(--theme-main-rgb), 0.04) 0%, transparent 6%);
    pointer-events: none;
    z-index: 998;
    transition: background 0.5s;
  }

  .scanlines {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 200%;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 1001;
    opacity: 0.65;
    animation: scanroll 8s linear infinite;
  }
  @keyframes scanroll { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }

  /* ─── PERFORMANTE CSS NOISE ─── */
  .css-noise {
    position: fixed;
    inset: -50%;
    width: 200%;
    height: 200%;
    pointer-events: none;
    z-index: 1002;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    mix-blend-mode: screen;
    animation: noiseAnim 0.2s infinite steps(2);
  }
  @keyframes noiseAnim {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-5%, -5%); }
  }

  /* ─── THEME TRANSITION ─── */
  .theme-transition-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .theme-transition-overlay.active { opacity: 1; }
  .theme-transition-overlay::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgb(var(--theme-main-rgb));
    opacity: 0;
    mix-blend-mode: screen;
    animation: pulseGlow 0.8s ease-out;
  }
  @keyframes pulseGlow {
    0%   { opacity: 0;   transform: scale(0.8); }
    50%  { opacity: 0.4; transform: scale(1.1); }
    100% { opacity: 0;   transform: scale(1.5); }
  }

  /* ─── TOP BAR / VISOR HEADER ─── */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 20px;
    background: rgba(0,0,0,0.88);
    border-bottom: 1px solid rgba(var(--theme-main-rgb), 0.35);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 1000;
    transition: border-color 0.4s, box-shadow 0.4s;
  }

  .visor-mode {
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: rgb(var(--theme-main-rgb));
    text-transform: uppercase;
    opacity: 0.7;
    font-family: "Roboto Mono", monospace;
    transition: color 0.4s;
  }

  .top-bar-ticks {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .top-bar-ticks span {
    display: block;
    height: 12px;
    width: 2px;
    background: rgb(var(--theme-main-rgb));
    opacity: 0.4;
    transition: background 0.4s;
  }
  .top-bar-ticks span:nth-child(3) { opacity: 0.9; height: 18px; }

  .theme-switch {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .theme-btn {
    background: transparent;
    border: 1px solid var(--theme-text-muted);
    color: var(--theme-text-muted);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.3s;
    display: grid;
    place-items: center;
    font-size: 0.7rem;
    position: relative;
    font-family: "Roboto Mono", monospace;
  }
  .theme-btn:hover, .theme-btn:focus {
    border-color: var(--theme-text);
    color: var(--theme-text);
    outline: none;
  }
  .theme-btn.active {
    border-color: rgb(var(--theme-main-rgb));
    color: rgb(var(--theme-main-rgb));
    box-shadow: 0 0 10px rgba(var(--theme-main-rgb), 0.55), inset 0 0 6px rgba(var(--theme-main-rgb), 0.08);
  }
  .theme-btn.active::after {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px solid rgb(var(--theme-main-rgb));
    opacity: 0.3;
    animation: pulse-ring 2s infinite;
  }
  @keyframes pulse-ring {
    0%   { transform: scale(1);    opacity: 0.3; }
    50%  { transform: scale(1.15); opacity: 0.1; }
    100% { transform: scale(1);    opacity: 0.3; }
  }

  /* ─── HUD CORNER BRACKETS ─── */
  .hud-frame { position: relative; }
  .hud-frame::before,
  .hud-frame::after,
  .hud-frame .hud-corner-br,
  .hud-frame .hud-corner-bl {
    content: "";
    position: absolute;
    width: 28px; height: 28px;
    pointer-events: none;
    z-index: 10;
    transition: border-color 0.4s, box-shadow 0.4s;
  }
  .hud-frame::before {
    top: -2px; left: -2px;
    border-top: 3px solid rgb(var(--theme-main-rgb));
    border-left: 3px solid rgb(var(--theme-main-rgb));
    box-shadow: -2px -2px 8px rgba(var(--theme-main-rgb), 0.55);
  }
  .hud-frame::after {
    top: -2px; right: -2px;
    border-top: 3px solid rgb(var(--theme-main-rgb));
    border-right: 3px solid rgb(var(--theme-main-rgb));
    box-shadow: 2px -2px 8px rgba(var(--theme-main-rgb), 0.55);
  }
  .hud-corner-br {
    bottom: -2px; right: -2px;
    border-bottom: 3px solid rgb(var(--theme-main-rgb));
    border-right: 3px solid rgb(var(--theme-main-rgb));
    box-shadow: 2px 2px 8px rgba(var(--theme-main-rgb), 0.55);
  }
  .hud-corner-bl {
    bottom: -2px; left: -2px;
    border-bottom: 3px solid rgb(var(--theme-main-rgb));
    border-left: 3px solid rgb(var(--theme-main-rgb));
    box-shadow: -2px 2px 8px rgba(var(--theme-main-rgb), 0.55);
  }

  /* ─── MAIN CONTAINER ─── */
  .container {
    max-width: 920px;
    margin: 24px auto;
    padding: 0 18px;
    padding-bottom: 60px;
  }

  .terminal-window {
    background: rgba(8, 18, 14, 0.93);
    border: 1px solid rgba(var(--theme-main-rgb), 0.35);
    box-shadow:
      0 0 40px rgba(0,0,0,0.7),
      inset 0 0 60px rgba(var(--theme-main-rgb), 0.08),
      0 0 1px rgba(var(--theme-main-rgb), 0.35);
    position: relative;
    backdrop-filter: blur(12px);
    border-radius: 2px;
    transition: border-color 0.4s, box-shadow 0.4s;
  }

  .terminal-window::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(var(--theme-main-rgb), 0.06) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    border-radius: 2px;
    opacity: 1;
  }

  .case-transition {
    animation: terminalGlitch 0.4s ease forwards;
  }
  @keyframes terminalGlitch {
    0% { opacity: 0; transform: translateY(10px); filter: blur(4px); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  .terminal-header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid rgba(var(--theme-main-rgb), 0.35);
    background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    gap: 4px;
    transition: border-color 0.4s;
  }

  .terminal-header::after {
    content: "";
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgb(var(--theme-main-rgb)), transparent);
    box-shadow: 0 0 10px rgb(var(--theme-main-rgb));
    transition: background 0.4s, box-shadow 0.4s;
  }

  .terminal-title {
    font-size: 1.25rem;
    color: rgb(var(--theme-main-rgb));
    text-transform: uppercase;
    letter-spacing: 6px;
    text-shadow: 0 0 14px rgba(var(--theme-main-rgb), 0.55), 0 0 40px rgba(var(--theme-main-rgb), 0.35);
    text-align: center;
    transition: color 0.4s, text-shadow 0.4s;
  }

  .terminal-subtitle {
    font-size: 0.68rem;
    color: var(--theme-text-muted);
    font-family: "Roboto Mono", monospace;
    text-align: center;
    letter-spacing: 2px;
    transition: color 0.4s;
  }

  .header-badge {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 40px; height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.25;
  }
  .header-badge.left  { left: 20px; }
  .header-badge.right { right: 20px; }
  .header-badge svg { width: 100%; height: 100%; fill: rgb(var(--theme-main-rgb)); }

  .progress-indicator {
    font-family: "Roboto Mono", monospace;
    font-size: 0.7rem;
    color: rgb(var(--theme-main-rgb));
    letter-spacing: 3px;
    margin-top: 6px;
    opacity: 0.8;
    transition: color 0.4s;
  }

  .terminal-content {
    padding: 24px;
    position: relative;
  }

  /* ─── PROGRESS BAR ─── */
  .progress-container { margin-bottom: 28px; }
  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: var(--theme-text-muted);
    text-transform: uppercase;
    font-family: "Roboto Mono", monospace;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.05);
    width: 100%;
    position: relative;
    display: flex;
    gap: 3px;
  }
  .progress-seg {
    flex: 1;
    background: rgba(255,255,255,0.05);
    position: relative;
    overflow: hidden;
  }
  .progress-seg.filled {
    background: rgb(var(--theme-main-rgb));
    box-shadow: 0 0 8px rgb(var(--theme-main-rgb));
  }
  .progress-seg.filled::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 60%, rgba(255,255,255,0.25));
  }

  /* ─── CASE BOX & TYPEWRITER CURSOR ─── */
  .case-box {
    background: rgba(0,0,0,0.4);
    border-left: 2px solid rgb(var(--theme-main-rgb));
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding: 14px 16px;
    margin-bottom: 24px;
    font-family: "Roboto Mono", monospace;
    font-size: 0.88rem;
    color: var(--theme-text);
    line-height: 1.65;
    position: relative;
    cursor: pointer;
    transition: border-color 0.4s;
    min-height: 80px;
  }
  .case-box::before {
    content: "";
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 16px 16px 0;
    border-color: transparent rgb(var(--theme-main-rgb)) transparent transparent;
    opacity: 0.4;
    transition: border-color 0.4s;
  }

  .type-cursor {
    display: inline-block;
    width: 8px;
    height: 1.2em;
    background-color: rgb(var(--theme-main-rgb));
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
    margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ─── RB INFO & INPUT ─── */
  .rb-info {
    background: rgba(0,0,0,0.4);
    border-left: 2px solid rgb(var(--theme-main-rgb));
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding: 12px 18px;
    margin-bottom: 22px;
    font-family: "Roboto Mono", monospace;
    font-size: 0.85rem;
    color: var(--theme-text);
    position: relative;
    transition: border-color 0.4s;
  }
  .rb-info::before {
    content: "";
    position: absolute;
    top: 0; right: 0;
    border-style: solid;
    border-width: 0 14px 14px 0;
    border-color: transparent rgb(var(--theme-main-rgb)) transparent transparent;
    opacity: 0.45;
    transition: border-color 0.4s;
  }

  #rb-input-wrapper {
    margin-bottom: 22px;
    padding: 12px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(var(--theme-main-rgb), 0.35);
    position: relative;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 0 8px rgba(var(--theme-main-rgb), 0.08);
    animation: fadeInRB 0.4s ease;
  }
  @keyframes fadeInRB {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #rb-input-wrapper:hover {
    background: rgba(0,0,0,0.6);
    border-color: rgb(var(--theme-main-rgb));
    box-shadow: 0 0 15px rgba(var(--theme-main-rgb), 0.55), inset 0 0 10px rgba(var(--theme-main-rgb), 0.08);
    transform: translateY(-2px);
  }
  #rb-input-wrapper:focus-within {
    background: rgba(var(--theme-main-rgb), 0.35);
    border-color: rgb(var(--theme-main-rgb));
    box-shadow:
      inset 4px 0 0 rgb(var(--theme-main-rgb)),
      inset 0 0 20px rgba(var(--theme-main-rgb), 0.55),
      0 0 30px rgba(var(--theme-main-rgb), 0.55),
      0 0 10px rgb(var(--theme-main-rgb));
    transform: translateY(-2px) scale(1.02);
    z-index: 10;
  }
  #rb-input-wrapper:has(input:disabled) {
    pointer-events: none;
    opacity: 0.85;
  }

  #rb-input-wrapper::before {
    content: "NÄCHSTE STUFE — REGELBEDARF ERMITTELN";
    display: block;
    margin-bottom: 10px;
    font-family: "Roboto Mono", monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--theme-text-muted);
  }
  #rb-input-wrapper label {
    display: block;
    margin-bottom: 8px;
    font-family: "Roboto Mono", monospace;
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgb(var(--theme-main-rgb));
    transition: color 0.4s;
  }
  #rb-input {
    width: 100%;
    padding: 10px 14px;
    font-family: "Roboto Mono", monospace;
    font-size: 1rem;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(var(--theme-main-rgb), 0.35);
    color: #6dffb3;
    outline: none;
    border-radius: 0;
    appearance: none;
    transition: all 0.3s ease;
    text-shadow: 0 0 8px rgba(109,255,179,0.5);
  }
  #rb-input:focus {
    border-color: rgb(var(--theme-main-rgb));
    color: #ffffff;
    text-shadow: 0 0 10px #6dffb3, 0 0 20px #6dffb3;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
  }
  #rb-input::placeholder { color: #333; }
  #rb-input:disabled {
    background: rgba(0,0,0,0.3);
    text-shadow: none;
    cursor: not-allowed;
  }

  /* ERROR SHAKE */
  .shake-error {
    animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    border-color: #ff4444 !important;
    box-shadow: inset 0 0 20px rgba(255, 68, 68, 0.2), 0 0 15px rgba(255, 68, 68, 0.4) !important;
  }
  @keyframes shake {
    10%, 90% { transform: translate3d(-1px, 0, 0); }
    20%, 80% { transform: translate3d(2px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
    40%, 60% { transform: translate3d(4px, 0, 0); }
  }

  /* ─── PERSON CARDS (OPTIONS) ─── */
  .persons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .person {
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(var(--theme-main-rgb), 0.35);
    padding: 13px 16px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    position: relative;
    overflow: hidden;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    display: flex;
    flex-direction: column;
    outline: none;
    box-shadow: 0 0 8px rgba(var(--theme-main-rgb), 0.08);
    user-select: none;
  }
  .person:focus-visible {
    border-color: rgb(var(--theme-main-rgb));
    box-shadow: 0 0 18px rgba(var(--theme-main-rgb), 0.55);
  }
  .person::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(var(--theme-main-rgb), 0.08), transparent);
    transform: translateX(-100%);
    transition: transform 0.45s;
    z-index: 0;
  }
  .person:hover::before { transform: translateX(100%); }
  .person:hover {
    background: rgba(var(--theme-main-rgb), 0.08);
    border-color: rgb(var(--theme-main-rgb));
    color: #ffffff;
    box-shadow:
      0 0 20px rgba(var(--theme-main-rgb), 0.55),
      inset 0 0 10px rgba(var(--theme-main-rgb), 0.08);
    transform: translateY(-2px);
  }
  .person:active { transform: translateY(0); }

  .person.selected {
    background: rgba(var(--theme-main-rgb), 0.35);
    border-color: rgb(var(--theme-main-rgb));
    color: #ffffff;
    box-shadow:
      inset 4px 0 0 rgb(var(--theme-main-rgb)),
      inset 0 0 20px rgba(var(--theme-main-rgb), 0.55),
      0 0 30px rgba(var(--theme-main-rgb), 0.55),
      0 0 10px rgb(var(--theme-main-rgb));
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.4), 0 0 15px rgb(var(--theme-main-rgb));
    transform: translateY(-2px) scale(1.02);
    z-index: 10;
  }
  .person.disabled {
    pointer-events: none;
    opacity: 0.65;
    filter: grayscale(0.2);
  }

  .option-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .option-header strong {
    font-family: "Roboto Mono", monospace;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--theme-text);
    line-height: 1.5;
  }
  .person.selected .option-header strong { color: #ffffff; text-shadow: 0 0 8px rgba(var(--theme-main-rgb), 0.55); }

  .checkbox-indicator {
    width: 16px; height: 16px;
    border: 1px solid var(--theme-text-muted);
    flex-shrink: 0;
    margin-left: 12px;
    transition: 0.2s;
    position: relative;
    transform: rotate(45deg);
  }
  .person.selected .checkbox-indicator {
    background: rgb(var(--theme-main-rgb));
    border-color: #ffffff;
    box-shadow: 0 0 15px #ffffff, 0 0 20px rgb(var(--theme-main-rgb));
  }
  .person.selected .checkbox-indicator::after {
    content: "";
    position: absolute;
    inset: -4px;
    border: 1px solid rgb(var(--theme-main-rgb));
    opacity: 0.3;

// =====================================
// THEME SWITCHER

function switchTheme(theme) {
  const overlay = document.getElementById('transition-overlay');
  overlay.classList.add('active');

  setTimeout(() => {
    document.body.setAttribute('data-theme', theme);
    updateCanvasColors(theme);

    document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.theme-btn[data-theme="${theme}"]`).classList.add('active');

    localStorage.setItem('preferredTheme', theme);

    setTimeout(() => overlay.classList.remove('active'), 400);
  }, 300);
}

window.addEventListener('DOMContentLoaded', () => {
  const savedTheme = localStorage.getItem('preferredTheme') || 'orange';
  document.body.setAttribute('data-theme', savedTheme);
  updateCanvasColors(savedTheme);
  document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
  const activeBtn = document.querySelector(`.theme-btn[data-theme="${savedTheme}"]`);
  if (activeBtn) activeBtn.classList.add('active');
});

// =====================================
// APP LOGIC
// =====================================
let currentIndex = 0;
let selectedIndices = [];
let typingTimeout;
let currentFullText = "";

const caseArea       = document.getElementById("case-area");
const caseTextEl     = document.getElementById("case-text");
const rbDisplayEl    = document.getElementById("rb-display");
const personsEl      = document.getElementById("persons");
const feedbackEl     = document.getElementById("feedback");
const checkBtn       = document.getElementById("check-btn");
const nextBtn        = document.getElementById("next-btn");
const rbInputWrapper = document.getElementById("rb-input-wrapper");
const rbInputEl      = document.getElementById("rb-input");
const progressEl     = document.getElementById("progress-indicator");
const progressBarEl  = document.getElementById("progress-bar");
const progressLabel  = document.getElementById("progress-label");

// Hilfsfunktion: Robuster Währungsparser (entfernt Tausenderpunkte)
function parseCurrency(valStr) {
  if (!valStr) return 0;
  return parseFloat(valStr.replace(/\./g, '').replace(',', '.')) || 0;
}

function formatCurrencyInput(inputElement) {
  inputElement.addEventListener('blur', function() {
    if (this.value) {
      let val = parseCurrency(this.value);
      if (!isNaN(val)) this.value = val.toFixed(2).replace('.', ',');
    }
  });
  
  // Enter zum Bestätigen innerhalb von Inputs
  inputElement.addEventListener('keydown', function(e) {
    if(e.key === 'Enter') {
      e.preventDefault();
      inputElement.blur(); // Triggert Formatierung
      if (!checkBtn.disabled) checkBtn.click();
    }
  });
}
formatCurrencyInput(rbInputEl);

// Typewriter Funktion (mit Skip-Möglichkeit)
function typeText(element, text, speed = 15) {
  currentFullText = text;
  element.innerHTML = '<span class="typed-text"></span><span class="type-cursor"></span>';
  const textSpan = element.querySelector('.typed-text');
  let i = 0;
  clearTimeout(typingTimeout);

  function type() {
    if (i < text.length) {
      textSpan.innerHTML += text.charAt(i);
      i++;
      typingTimeout = setTimeout(type, speed);
    } else {
      const cursor = element.querySelector('.type-cursor');
      if (cursor) cursor.style.display = 'none';
      typingTimeout = null;
    }
  }
  type();
}

// Click-Event um den Typewriter zu überspringen
caseTextEl.addEventListener("click", () => {
  if (typingTimeout) {
    clearTimeout(typingTimeout);
    typingTimeout = null;
    const textSpan = caseTextEl.querySelector('.typed-text');
    if (textSpan) textSpan.innerHTML = currentFullText;
    const cursor = caseTextEl.querySelector('.type-cursor');
    if (cursor) cursor.style.display = 'none';
  }
});

// Globaler Keydown Listener für "Enter" (wenn man gerade nicht im Input ist)
document.addEventListener("keydown", (e) => {
  if (e.key === 'Enter') {
    const activeTag = document.activeElement.tagName;
    if (activeTag !== 'INPUT' && activeTag !== 'BUTTON') {
      if (!checkBtn.disabled && checkBtn.style.display !== 'none') {
        checkBtn.click();
      } else if (!nextBtn.disabled && nextBtn.style.display !== 'none') {
        nextBtn.click();
      }
    }
  }
});

function updateProgressBar() {
  progressBarEl.innerHTML = '';
  progressLabel.textContent = `${currentIndex} / ${cases.length}`;
  for (let i = 0; i < cases.length; i++) {
    const seg = document.createElement('div');
    seg.classList.add('progress-seg');
    if (i < currentIndex) seg.classList.add('filled');
    progressBarEl.appendChild(seg);
  }
}

function loadCase() {
  const currentCase = cases[currentIndex];

  progressEl.textContent = `[ FALL ${currentIndex + 1} / ${cases.length} ]`;
  updateProgressBar();

  caseArea.classList.remove('case-transition');
  void caseArea.offsetWidth;
  caseArea.classList.add('case-transition');

  typeText(caseTextEl, currentCase.text);

  if (currentCase.requireRbInput) {
    rbDisplayEl.style.display = "none";
    rbInputWrapper.style.display = "block";
    rbInputEl.value = "";
  } else {
    rbInputWrapper.style.display = "none";
    rbDisplayEl.style.display = "block";
    rbDisplayEl.textContent = currentCase.rbText || "";
  }

  personsEl.innerHTML  = "";
  feedbackEl.innerHTML = "";
  selectedIndices = [];

  checkBtn.style.display  = "block";
  checkBtn.disabled       = false;
  checkBtn.textContent    = "Berechnung Prüfen";
  nextBtn.style.display   = "block";
  nextBtn.disabled        = true;

  currentCase.options.forEach((option, index) => {
    const div = document.createElement("div");
    div.classList.add("person");
    div.dataset.index = index;
    div.setAttribute("tabindex", "0");
    // Accessibility Attribute
    div.setAttribute("role", "checkbox");
    div.setAttribute("aria-checked", "false");

    const header = document.createElement("div");
    header.classList.add("option-header");
    header.innerHTML = `
      <strong>${option.label}</strong>
      <div class="checkbox-indicator"></div>
    `;
    div.appendChild(header);

    const inputWrap = document.createElement("div");
    inputWrap.classList.add("calc-input-wrapper");
    inputWrap.innerHTML = `
      <label class="calc-input-label">Betrag in Euro:</label>
      <div class="input-wrapper">
        <input type="text" class="calc-input" placeholder="0,00" id="input-${index}">
      </div>
    `;
    inputWrap.addEventListener("click", e => e.stopPropagation());
    div.appendChild(inputWrap);

    const toggleSelection = () => {
      if (checkBtn.disabled) return;
      const inputField = div.querySelector(`#input-${index}`);

      div.classList.toggle("selected");
      const isSelected = div.classList.contains("selected");
      div.setAttribute("aria-checked", isSelected ? "true" : "false");

      if (isSelected) {
        selectedIndices.push(index);
        if (inputField) setTimeout(() => inputField.focus(), 100);
      } else {
        selectedIndices = selectedIndices.filter(i => i !== index);
        if (inputField) inputField.value = "";
      }
    };

    div.addEventListener("click", toggleSelection);
    div.addEventListener("keydown", (e) => {
      if (e.key === ' ' || (e.key === 'Enter' && e.target === div)) {
        e.preventDefault();
        toggleSelection();
      }
    });

    personsEl.appendChild(div);

    const newlyCreatedInput = document.getElementById(`input-${index}`);
    if (newlyCreatedInput) formatCurrencyInput(newlyCreatedInput);
  });
}

checkBtn.addEventListener("click", () => {
  const currentCase = cases[currentIndex];
  let rbBase = currentCase.baseValue;

  if (currentCase.requireRbInput) {
    const enteredRb = parseCurrency(rbInputEl.value);
    
    if (!enteredRb || enteredRb <= 0) {
      rbInputWrapper.classList.add('shake-error');
      setTimeout(() => rbInputWrapper.classList.remove('shake-error'), 400);
      rbInputEl.focus();
      return;
    }
    if (enteredRb !== currentCase.baseValue) {
      feedbackEl.innerHTML = `
        <div class="feedback-card fb-wrong">
          <span class="tag-err">[ ERR ]</span> Der maßgebende Regelbedarf ist falsch.<br>
          Richtig wäre: ${currentCase.baseValue.toFixed(2).replace('.', ',')} €
        </div>`;
      return;
    }
    rbBase = enteredRb;
  }

  feedbackEl.innerHTML = "";
  document.querySelectorAll('.person').forEach(p => p.classList.add('disabled'));

  let allCorrect = true;

  currentCase.options.forEach((option, index) => {
    const isSelected = selectedIndices.includes(index);
    const inputEl    = document.getElementById(`input-${index}`);
    let userValue    = 0;
    
    if (inputEl && inputEl.value) {
      userValue = parseCurrency(inputEl.value);
    }

    const correctValue = parseFloat((rbBase * (option.percent / 100)).toFixed(2));
    const rbBaseStr = rbBase.toFixed(2).replace('.', ',');
    const correctValueStr = correctValue.toFixed(2).replace('.', ',');
    
    const resDiv = document.createElement("div");
    resDiv.classList.add("feedback-card");

    if (option.isCorrect) {
      if (isSelected) {
        if (Math.abs(userValue - correctValue) < 0.1) {
          resDiv.classList.add("fb-correct");
          resDiv.innerHTML = `<span class='tag-ok'>[ OK ]</span> <strong>${option.label}</strong>: Richtig ausgewählt & korrekt berechnet!<br>
            <span class="math-detail">${rbBaseStr} € × ${option.percent}% = ${correctValueStr} €</span>`;
        } else {
          resDiv.classList.add("fb-partial");
          resDiv.innerHTML = `<span class="tag-wrn">[ WRN ]</span> <strong>${option.label}</strong>: Richtiger Bedarf, aber falscher Betrag.<br>
            Deine Eingabe: ${userValue.toFixed(2).replace('.', ',')} €<br>
            <span class="math-detail">Richtig wäre: ${rbBaseStr} € × ${option.percent}% = ${correctValueStr} €</span>`;
          allCorrect = false;
        }
      } else {
        resDiv.classList.add("fb-wrong");
        resDiv.innerHTML = `<span class="tag-err">[ ERR ]</span> <strong>${option.label}</strong>: Dieser Mehrbedarf wurde vergessen.<br>${option.reason}`;
        allCorrect = false;
      }
    } else {
      if (isSelected) {
        resDiv.classList.add("fb-wrong");
        resDiv.innerHTML = `<span class="tag-err">[ ERR ]</span> <strong>${option.label}</strong>: Dieser Mehrbedarf steht nicht zu.<br>${option.reason}`;
        allCorrect = false;
      }
    }

    if (isSelected || option.isCorrect) feedbackEl.appendChild(resDiv);
  });

  if (feedbackEl.innerHTML === "") {
    feedbackEl.innerHTML = `<div class="feedback-card fb-correct"><span class="tag-ok">[ OK ]</span> Korrekt! Keine Mehrbedarfe in diesem Fall.</div>`;
  }

  checkBtn.disabled = true;
  nextBtn.disabled  = false;
  setTimeout(() => {
    feedbackEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
});

function nextCase() {
  if (currentIndex < cases.length - 1) {
    currentIndex++;
    loadCase();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    progressEl.textContent = "[ STATUS: COMPLETE ]";
    updateProgressBar();
    const segs = progressBarEl.querySelectorAll('.progress-seg');
    segs.forEach(s => s.classList.add('filled'));
    progressLabel.textContent = `${cases.length} / ${cases.length}`;

    caseArea.innerHTML = `
      <h2 style="color:#6dffb3; text-align:center; font-size:1.6rem; text-shadow:0 0 20px #6dffb3; letter-spacing:3px; margin: 20px 0;">✓ TRAINING ABGESCHLOSSEN</h2>
      <p style="text-align:center; margin-bottom:20px; color:var(--theme-text-muted); font-family:'Roboto Mono', monospace; font-size:0.85rem;">Alle Fälle wurden erfolgreich bearbeitet.</p>`;
    feedbackEl.innerHTML  = "";
    checkBtn.style.display = "none";
    nextBtn.style.display  = "none";
  }
}

loadCase();

// =====================================
// HEX GRID CANVAS (Main Theme)
// =====================================
const canvas = document.getElementById("bg-canvas");
const ctx = canvas.getContext("2d");

let themeColor = { r: 255, g: 123, b: 0 };

function updateCanvasColors(theme) {
  switch (theme) {
    case 'blue':   themeColor = { r: 0,   g: 212, b: 255 }; break;
    case 'orange': themeColor = { r: 255, g: 123, b: 0   }; break;
    case 'green':  themeColor = { r: 0,   g: 255, b: 136 }; break;
  }
}

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Hex grid params
const hexSize = 28;
const hexH = hexSize * Math.sqrt(3);
const hexW = hexSize * 2;

function drawHex(cx, cy, size, alpha) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 6;
    const x = cx + size * Math.cos(angle);
    const y = cy + size * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.strokeStyle = `rgba(${themeColor.r},${themeColor.g},${themeColor.b},${alpha})`;
  ctx.lineWidth = 0.5;
  ctx.stroke();
}

// Floating particles
let particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    size: Math.random() * 2 + 0.5,
    speed: Math.random() * 0.6 + 0.15,
    opacity: Math.random() * 0.4 + 0.1
  });
}

let animFrame = 0;

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cols = Math.ceil(canvas.width / (hexW * 0.75)) + 2;
  const rows = Math.ceil(canvas.height / hexH) + 2;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const cx = col * hexW * 0.75;
      const cy = row * hexH + (col % 2 === 1 ? hexH / 2 : 0);

      const dx = cx - canvas.width / 2;
      const dy = cy - canvas.height / 2;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxDist = Math.sqrt(canvas.width * canvas.width + canvas.height * canvas.height) / 2;
      const pulse = 0.02 + 0.04 * Math.sin(animFrame * 0.008 + dist * 0.003);
      const alpha = Math.max(0.01, pulse * (1 - dist / maxDist * 0.5));

      drawHex(cx, cy, hexSize, alpha);
    }
  }

  particles.forEach(p => {
    ctx.fillStyle = `rgba(${themeColor.r},${themeColor.g},${themeColor.b},${p.opacity})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();

    p.y -= p.speed;
    if (p.y < -10) {
      p.y = canvas.height + 10;
      p.x = Math.random() * canvas.width;
    }
  });

  animFrame++;
  requestAnimationFrame(animate);
}
animate();

// =====================================
// BACK BUTTON
// =====================================
function triggerBackClick(e) {
  e.preventDefault();
  setTimeout(() => { window.location.href = 'index.html'; }, 200);
}
</script>
